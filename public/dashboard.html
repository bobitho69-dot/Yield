<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your projects — Yield</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* ================= Projects dashboard — editorial workspace surface ================= */
    .lp-nav { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--line); }
    /* Active nav link: neutral text + 2px purple underline */
    .toplink.is-active { color: var(--text); position: relative; }
    .toplink.is-active::after { content: ""; position: absolute; left: 0; right: .4rem; bottom: -6px; height: 2px; background: var(--brand); border-radius: 2px; }
    .nav-new { display: inline-flex; align-items: center; gap: .4rem; }
    .nav-new svg { display: block; }

    .dash-wrap { max-width: 1200px; margin: 0 auto; padding: 48px 6vw 96px; }

    /* ---- Editorial header ---- */
    .dash-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .dash-eyebrow { font-family: var(--font-mono); font-size: .75rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); margin: 0 0 12px; }
    .dash-head h1 { font-family: var(--font-display); font-weight: 700; font-size: clamp(2.2rem, 4vw, 3.2rem); line-height: 1.02; letter-spacing: -.03em; margin: 0; color: var(--text); }
    .dash-sub { font-family: var(--font-body); font-size: 1rem; line-height: 1.55; color: var(--muted); margin: 12px 0 0; max-width: 46ch; }
    .dash-new { display: inline-flex; align-items: center; gap: .45rem; background: var(--brand); border: 1px solid transparent; color: #fff; font-weight: 600; font-size: .9rem; padding: .6rem 1rem; border-radius: 9px; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .dash-new:hover { background: #e08a6d; }
    .dash-new:focus-visible { outline: 2px solid var(--brand-2); outline-offset: 2px; }
    .dash-new svg { display: block; }

    /* ---- Toolbar: search / sort / count ---- */
    .dash-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 32px; padding: 12px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
    .dash-search { position: relative; display: inline-flex; align-items: center; }
    .dash-search > svg { position: absolute; left: 12px; color: var(--faint); pointer-events: none; }
    .dash-search input { width: 280px; max-width: 100%; background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; padding: 9px 12px 9px 36px; color: var(--text); font-family: var(--font-body); font-size: .85rem; transition: border-color .15s, box-shadow .15s; }
    .dash-search input::placeholder { color: var(--faint); }
    .dash-search input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(217,119,87,.22); }
    .dash-tools-right { display: flex; align-items: center; gap: 16px; }
    .seg { display: inline-flex; background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; padding: 2px; }
    .seg button { font-family: var(--font-mono); font-size: .72rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); background: transparent; border: 0; padding: 6px 12px; border-radius: 7px; cursor: pointer; transition: background .15s, color .15s; }
    .seg button:hover { color: var(--text); }
    .seg button.on { background: var(--panel); color: var(--text); }
    .seg button:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
    .dash-count { font-family: var(--font-mono); font-size: .75rem; letter-spacing: .04em; color: var(--faint); white-space: nowrap; }

    /* ---- Section divider labels ---- */
    .sec-label { display: flex; align-items: center; gap: 16px; font-family: var(--font-mono); font-size: .7rem; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: var(--faint); margin: 40px 0 20px; }
    .sec-label::after { content: ""; flex: 1 1 auto; height: 1px; background: var(--line); }
    .sec-label:first-child { margin-top: 28px; }

    /* ---- Grid ---- */
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }

    /* ---- Standard project card ---- */
    .proj-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: border-color .15s; }
    .proj-card:hover { border-color: var(--line-strong); }
    .proj-card:focus-within { outline: 2px solid var(--brand); outline-offset: 2px; }
    .pc-top { display: flex; align-items: center; gap: 10px; }
    .proj-logo { width: 26px; height: 26px; border-radius: 7px; flex: 0 0 auto; background: var(--panel-2); border: 1px solid var(--line); }
    .pc-title { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; letter-spacing: -.01em; margin: 0; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pc-title a { color: inherit; }
    .pc-title a:hover { color: var(--text); }
    .pc-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand-2); flex: 0 0 auto; margin-left: auto; }
    .proj-desc { font-family: var(--font-body); margin: 0; color: var(--muted); font-size: .875rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .pc-signal { display: flex; align-items: center; gap: 8px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-family: var(--font-mono); font-size: .74rem; letter-spacing: .02em; color: var(--muted); transition: background .15s; }
    .proj-card:hover .pc-signal, .dash-hero:hover .pc-signal { background: var(--panel-3); }
    .pc-signal .pc-livedot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand-2); flex: 0 0 auto; }
    .pc-signal.muted { color: var(--faint); }
    .pc-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: auto; padding-top: 4px; }
    .pc-meta { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .when { font-family: var(--font-mono); font-size: .72rem; letter-spacing: .02em; color: var(--faint); white-space: nowrap; }
    .pc-gh { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: .72rem; letter-spacing: .02em; color: var(--brand-2); }
    .pc-gh svg { display: block; }
    .pc-gh:hover { text-decoration: underline; }
    .proj-actions { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }

    /* Card buttons */
    .pc-open { display: inline-flex; align-items: center; background: transparent; border: 1px solid var(--line); color: var(--text); font-weight: 600; font-size: .82rem; padding: .4rem .8rem; border-radius: 8px; transition: border-color .15s, background .15s; }
    .pc-open:hover { border-color: var(--line-strong); background: var(--panel-2); }
    .pc-open:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

    /* Kebab overflow menu (Delete lives here to prevent accidental deletes) */
    .pc-kebab-wrap { position: relative; }
    .pc-kebab { display: inline-grid; place-items: center; width: 32px; height: 30px; background: transparent; border: 1px solid transparent; border-radius: 8px; color: var(--muted); cursor: pointer; transition: border-color .15s, background .15s, color .15s; }
    .pc-kebab:hover { border-color: var(--line); background: var(--panel-2); color: var(--text); }
    .pc-kebab:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
    .pc-menu { position: absolute; right: 0; bottom: calc(100% + 6px); min-width: 150px; background: var(--panel); border: 1px solid var(--line-strong); border-radius: 10px; box-shadow: var(--shadow); padding: 6px; z-index: 20; display: none; }
    .pc-menu.open { display: block; }
    .pc-menu button { display: flex; align-items: center; gap: 8px; width: 100%; background: transparent; border: 0; color: var(--danger); font-family: var(--font-body); font-size: .84rem; font-weight: 500; text-align: left; padding: .45rem .55rem; border-radius: 7px; cursor: pointer; }
    .pc-menu button:hover { background: var(--panel-2); }
    .pc-menu button:focus-visible { outline: 2px solid var(--danger); outline-offset: -2px; }
    .pc-menu svg { display: block; }

    /* ---- Hero (most recently edited) ---- */
    .dash-hero { display: grid; grid-template-columns: 320px 1fr; background: var(--panel); border: 1px solid var(--line); border-left: 2px solid var(--brand); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
    .dash-hero:hover { border-color: var(--line-strong); border-left-color: var(--brand); }
    .dh-preview { position: relative; background: var(--panel-2); border-right: 1px solid var(--line); overflow: hidden; min-height: 220px; }
    .dh-preview iframe { position: absolute; top: 0; left: 0; width: 200%; height: 200%; border: 0; transform: scale(.5); transform-origin: top left; pointer-events: none; }
    .dh-preview .dh-noprev { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; gap: 8px; padding: 24px; font-family: var(--font-mono); font-size: .74rem; color: var(--faint); }
    .dh-noprev .dh-caret { color: var(--brand-2); }
    .dh-body { padding: 24px; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .dh-body .pc-top { align-items: flex-start; }
    .dh-body h3 { font-family: var(--font-display); font-weight: 700; font-size: 1.5rem; letter-spacing: -.02em; margin: 0; color: var(--text); overflow: hidden; text-overflow: ellipsis; }
    .dh-body h3 a { color: inherit; }
    .dh-actions { display: flex; align-items: center; gap: 8px; }
    .dh-open { background: var(--brand); border: 1px solid transparent; color: #fff; font-weight: 600; font-size: .85rem; padding: .5rem .95rem; border-radius: 8px; transition: background .15s; }
    .dh-open:hover { background: #e08a6d; }
    .dh-open:focus-visible { outline: 2px solid var(--brand-2); outline-offset: 2px; }

    /* ---- No-match inline row ---- */
    .dash-nomatch { font-family: var(--font-mono); font-size: .8rem; color: var(--muted); padding: 24px 0; }
    .dash-nomatch b { color: var(--text); font-weight: 500; }

    /* ---- Loading skeleton ---- */
    .sk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .sk-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .sk { background: var(--panel-2); border-radius: 6px; animation: skpulse 1.4s ease-in-out infinite; }
    .sk-row { display: flex; align-items: center; gap: 10px; }
    .sk-logo { width: 26px; height: 26px; border-radius: 7px; }
    .sk-title { height: 14px; width: 55%; }
    .sk-line { height: 10px; }
    .sk-block { height: 40px; border-radius: 8px; }
    @keyframes skpulse { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }
    @media (prefers-reduced-motion: reduce) { .sk { animation: none; } }

    /* ---- Empty / error / sign-in states — left aligned, not centered ---- */
    .dash-state { max-width: 560px; padding: 8px 0 0; }
    .dash-state.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 28px; }
    .ds-eyebrow { font-family: var(--font-mono); font-size: .72rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; margin: 0 0 12px; color: var(--faint); }
    .ds-eyebrow.err { color: var(--danger); }
    .dash-state h2 { font-family: var(--font-display); font-weight: 700; font-size: 1.75rem; line-height: 1.1; letter-spacing: -.02em; margin: 0; color: var(--text); }
    .dash-state p { font-family: var(--font-body); font-size: 1rem; line-height: 1.55; color: var(--muted); margin: 12px 0 20px; }
    .ds-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    @media (max-width: 720px) {
      .dash-wrap { padding: 32px 6vw 64px; }
      .dash-head { align-items: flex-start; }
      .dash-toolbar { align-items: stretch; }
      .dash-search input { width: 100%; }
      .dash-search { flex: 1 1 100%; }
      .dash-tools-right { width: 100%; justify-content: space-between; }
      .dash-hero { grid-template-columns: 1fr; }
      .dh-preview { border-right: 0; border-bottom: 1px solid var(--line); min-height: 160px; }
    }
  </style>
</head>
<body>
  <header class="nav lp-nav">
    <a class="brand sm" href="/">
      <svg class="logo-mark" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><rect x="6.5" y="6.5" width="11" height="11" rx="3" transform="rotate(45 12 12)" fill="#d97757"/><rect x="10" y="10" width="4" height="4" rx="1.2" transform="rotate(45 12 12)" fill="#89a06a"/></svg> Yield
    </a>
    <nav class="nav-links">
      <a class="toplink is-active" href="/dashboard">Projects</a>
      <a class="toplink" href="/security">Security</a>
      <a class="toplink" href="/roblox">Roblox</a>
      <a class="toplink" href="/pricing">Pricing</a>
      <a class="toplink" href="/account">Account</a>
      <a class="btn primary sm nav-new" href="/app"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg> New app</a>
      <span id="authArea"></span>
    </nav>
  </header>

  <div class="dash-wrap">
    <div class="dash-head">
      <div>
        <p class="dash-eyebrow">Workspace / Projects</p>
        <h1>Your projects</h1>
        <p class="dash-sub">Your apps, live previews, and repos — open one to keep building, or start a new chat.</p>
      </div>
      <button class="dash-new" onclick="location.href='/app'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        New app
      </button>
    </div>

    <div id="content">
      <div class="sk-grid" aria-hidden="true">
        <div class="sk-card"><div class="sk-row"><div class="sk sk-logo"></div><div class="sk sk-title"></div></div><div class="sk sk-line" style="width:80%"></div><div class="sk sk-line" style="width:60%"></div><div class="sk sk-block"></div></div>
        <div class="sk-card"><div class="sk-row"><div class="sk sk-logo"></div><div class="sk sk-title"></div></div><div class="sk sk-line" style="width:70%"></div><div class="sk sk-line" style="width:50%"></div><div class="sk sk-block"></div></div>
        <div class="sk-card"><div class="sk-row"><div class="sk sk-logo"></div><div class="sk sk-title"></div></div><div class="sk sk-line" style="width:85%"></div><div class="sk sk-line" style="width:55%"></div><div class="sk sk-block"></div></div>
        <div class="sk-card"><div class="sk-row"><div class="sk sk-logo"></div><div class="sk sk-title"></div></div><div class="sk sk-line" style="width:65%"></div><div class="sk sk-line" style="width:70%"></div><div class="sk sk-block"></div></div>
      </div>
    </div>
  </div>

  <script>
    const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const ago = (t) => { const d = (Date.now()/1000 - t); if (d<3600) return Math.max(1,Math.round(d/60))+'m ago'; if (d<86400) return Math.round(d/3600)+'h ago'; return Math.round(d/86400)+'d ago'; };

    // SVG icon fragments (crisp stroke icons — no glyphs)
    const ICON = {
      gh: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17 17 7M8 7h9v9"/></svg>',
      kebab: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="5" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="12" cy="19" r="1.7"/></svg>',
      trash: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V6"/></svg>'
    };

    let ALL = [];
    let sortMode = 'edited';
    let query = '';

    function ghLink(p) {
      if (p.github_url && /^https:\/\//.test(p.github_url)) {
        return `<a class="pc-gh" href="${esc(p.github_url)}" target="_blank" rel="noopener noreferrer">GitHub ${ICON.gh}</a>`;
      }
      return '';
    }

    function signal(p) {
      return p.has_code
        ? `<div class="pc-signal"><span class="pc-livedot"></span>Live · code ready</div>`
        : `<div class="pc-signal muted">No code yet — open a chat to build it</div>`;
    }

    function heroCard(p) {
      const preview = p.has_code
        ? `<iframe loading="lazy" src="/api/projects/${p.id}/preview" title=""></iframe>`
        : `<div class="dh-noprev"><span class="dh-caret">~/ new project</span><span>No preview yet — start a chat to generate code.</span></div>`;
      return `
        <div class="dash-hero proj-card" style="padding:0;flex-direction:row;">
          <div class="dh-preview">${preview}</div>
          <div class="dh-body">
            <div class="pc-top">
              ${p.logo ? `<img class="proj-logo" src="data:image/svg+xml,${encodeURIComponent(p.logo)}" alt="" loading="lazy">` : ''}
              <h3><a href="/app?project=${p.id}">${esc(p.title)}</a></h3>
              ${p.has_code ? '<span class="pc-dot" title="Live"></span>' : ''}
            </div>
            ${p.description ? `<p class="proj-desc">${esc(p.description)}</p>` : ''}
            ${signal(p)}
            <div class="pc-foot">
              <div class="pc-meta">
                <span class="when">edited ${ago(p.updated_at)}</span>
                ${ghLink(p)}
              </div>
              <div class="dh-actions proj-actions">
                <a class="dh-open" href="/app?project=${p.id}">Open</a>
                ${kebab(p.id)}
              </div>
            </div>
          </div>
        </div>`;
    }

    function kebab(id) {
      return `<span class="pc-kebab-wrap">
        <button class="pc-kebab" aria-haspopup="true" aria-expanded="false" title="More" onclick="toggleMenu(event, this)">${ICON.kebab}</button>
        <div class="pc-menu" role="menu">
          <button role="menuitem" onclick="del('${id}')">${ICON.trash} Delete project</button>
        </div>
      </span>`;
    }

    function card(p) {
      return `
        <div class="proj-card">
          <div class="pc-top">
            ${p.logo ? `<img class="proj-logo" src="data:image/svg+xml,${encodeURIComponent(p.logo)}" alt="" loading="lazy">` : ''}
            <h3 class="pc-title"><a href="/app?project=${p.id}">${esc(p.title)}</a></h3>
            ${p.has_code ? '<span class="pc-dot" title="Live"></span>' : ''}
          </div>
          ${p.description ? `<p class="proj-desc">${esc(p.description)}</p>` : ''}
          ${signal(p)}
          <div class="pc-foot">
            <div class="pc-meta">
              <span class="when">edited ${ago(p.updated_at)}</span>
              ${ghLink(p)}
            </div>
            <div class="proj-actions">
              <a class="pc-open" href="/app?project=${p.id}">Open</a>
              ${kebab(p.id)}
            </div>
          </div>
        </div>`;
    }

    function renderGrid() {
      const content = document.getElementById('content');
      let list = ALL.slice();
      if (query) list = list.filter(p => (p.title || '').toLowerCase().includes(query));
      if (sortMode === 'name') list.sort((a,b) => (a.title||'').localeCompare(b.title||''));
      else list.sort((a,b) => (b.updated_at||0) - (a.updated_at||0));

      const count = `<span class="dash-count">${ALL.length} project${ALL.length===1?'':'s'}</span>`;
      const toolbar = `
        <div class="dash-toolbar">
          <div class="dash-search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="dashSearch" type="text" placeholder="Filter projects…" value="${esc(query)}" aria-label="Filter projects by name" autocomplete="off">
          </div>
          <div class="dash-tools-right">
            <div class="seg" role="group" aria-label="Sort projects">
              <button data-sort="edited" class="${sortMode==='edited'?'on':''}" onclick="setSort('edited')">Last edited</button>
              <button data-sort="name" class="${sortMode==='name'?'on':''}" onclick="setSort('name')">Name</button>
            </div>
            ${count}
          </div>
        </div>`;

      let body;
      if (!list.length && query) {
        body = `<div class="dash-nomatch">No projects match <b>&ldquo;${esc(query)}&rdquo;</b>.</div>`;
      } else {
        const showHero = sortMode === 'edited' && !query && list.length > 0;
        let inner = '';
        if (showHero) {
          const hero = list[0];
          const rest = list.slice(1);
          inner += `<div class="sec-label">Recent</div>${heroCard(hero)}`;
          if (rest.length) inner += `<div class="sec-label">All projects</div><div class="dash-grid">${rest.map(card).join('')}</div>`;
        } else {
          inner += `<div class="sec-label">All projects</div><div class="dash-grid">${list.map(card).join('')}</div>`;
        }
        body = inner;
      }

      content.innerHTML = toolbar + body;

      const search = document.getElementById('dashSearch');
      if (search) {
        search.oninput = (e) => { query = e.target.value.trim().toLowerCase(); const pos = e.target.selectionStart; renderGrid(); const s = document.getElementById('dashSearch'); if (s) { s.focus(); try { s.setSelectionRange(pos, pos); } catch(_){} } };
      }
    }

    function setSort(mode) { sortMode = mode; renderGrid(); }

    function toggleMenu(ev, btn) {
      ev.stopPropagation();
      const menu = btn.nextElementSibling;
      const isOpen = menu.classList.contains('open');
      document.querySelectorAll('.pc-menu.open').forEach(m => { m.classList.remove('open'); const b = m.previousElementSibling; if (b) b.setAttribute('aria-expanded','false'); });
      if (!isOpen) { menu.classList.add('open'); btn.setAttribute('aria-expanded','true'); }
    }
    document.addEventListener('click', () => { document.querySelectorAll('.pc-menu.open').forEach(m => { m.classList.remove('open'); const b = m.previousElementSibling; if (b) b.setAttribute('aria-expanded','false'); }); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') document.querySelectorAll('.pc-menu.open').forEach(m => { m.classList.remove('open'); const b = m.previousElementSibling; if (b) b.setAttribute('aria-expanded','false'); }); });

    (async function () {
      // Auth state
      const me = await fetch('/api/auth/me').then(r=>r.json()).catch(()=>({user:null}));
      const auth = document.getElementById('authArea');
      auth.innerHTML = me.user
        ? `<button id="logout" class="btn ghost sm">Sign out</button>`
        : `<a class="btn ghost sm" href="/login">Sign in</a>`;
      if (me.user) document.getElementById('logout').onclick = async () => { await fetch('/api/auth/logout',{method:'POST'}); location.reload(); };

      const content = document.getElementById('content');
      let res;
      try {
        res = await fetch('/api/projects');
      } catch (e) {
        content.innerHTML = `<div class="dash-state panel"><p class="ds-eyebrow err">ERR_NETWORK</p><h2>Couldn't reach your projects</h2>
          <p>Check your connection and try again.</p><div class="ds-actions"><button class="btn primary" onclick="location.reload()">Retry</button></div></div>`;
        return;
      }
      if (res.status === 401) {
        content.innerHTML = `<div class="dash-state panel"><p class="ds-eyebrow">SIGN IN REQUIRED</p><h2>Sign in to see your projects</h2>
          <p>Your builds are saved to your account.</p><div class="ds-actions"><a class="btn primary" href="/login">Sign in</a><a class="btn ghost" href="/">Back home</a></div></div>`;
        return;
      }
      if (!res.ok) {
        content.innerHTML = `<div class="dash-state panel"><p class="ds-eyebrow err">ERR_SERVER</p><h2>Couldn't load your projects</h2>
          <p>Couldn't reach your projects. This is on us — retry in a moment.</p><div class="ds-actions"><button class="btn primary" onclick="location.reload()">Retry</button></div></div>`;
        return;
      }
      let projects;
      try {
        ({ projects } = await res.json());
      } catch (e) {
        content.innerHTML = `<div class="dash-state panel"><p class="ds-eyebrow err">ERR_PARSE</p><h2>Couldn't load your projects</h2>
          <p>Couldn't reach your projects. This is on us — retry in a moment.</p><div class="ds-actions"><button class="btn primary" onclick="location.reload()">Retry</button></div></div>`;
        return;
      }

      if (!projects || !projects.length) {
        content.innerHTML = `<div class="dash-state"><p class="ds-eyebrow">NO PROJECTS YET</p><h2>Nothing built here — start with a chat.</h2>
          <p>Describe an app in plain English and Yield writes the code.</p>
          <div class="ds-actions"><a class="btn primary" href="/app">New app</a><a class="btn ghost" href="/chat">Open chat</a></div></div>`;
        return;
      }

      ALL = projects;
      renderGrid();
    })();

    async function del(id) {
      if (!confirm('Delete this project? This cannot be undone.')) return;
      await fetch('/api/projects/'+id, { method:'DELETE' });
      location.reload();
    }
  </script>
</body>
</html>
