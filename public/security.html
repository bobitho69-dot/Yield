<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yield Security — scan your repos for vulnerabilities</title>
<meta name="description" content="Yield Security scans your GitHub repos and Yield projects for vulnerabilities with every top AI model. Code is analyzed and discarded — only findings are kept.">
<link rel="stylesheet" href="/styles.css">
<style>
  .sec-page { max-width: 980px; margin: 0 auto; padding: 1.5rem 5vw 4rem; }
  .sec-hero { text-align: center; padding: 2rem 0 1rem; }
  .sec-hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); letter-spacing: -.03em; margin: .4rem 0; }
  .sec-hero .pill { margin-bottom: 1rem; }
  .sec-hero p.lead { color: var(--muted); font-size: 1.1rem; max-width: 620px; margin: .6rem auto 1.4rem; line-height: 1.6; }
  .sec-feats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 2rem 0; }
  .sec-feat { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 1.1rem; text-align: left; }
  .sec-feat h3 { margin: .3rem 0 .4rem; font-size: 1rem; }
  .sec-feat p { color: var(--muted); font-size: .88rem; margin: 0; line-height: 1.5; }
  .price-card { background: var(--panel); border: 1px solid var(--brand); border-radius: 14px; padding: 1.4rem; max-width: 420px; margin: 1.5rem auto; box-shadow: var(--shadow); }
  .price-card .amt { font-size: 2.4rem; font-weight: 800; } .price-card .amt small { font-size: 1rem; color: var(--muted); font-weight: 600; }
  .cwe-row { display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center; margin: 1.2rem 0; }
  .cwe-chip { font-size: .72rem; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: .15rem .55rem; }
  .scan-bar { display: flex; flex-wrap: wrap; gap: .6rem; align-items: center; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: .8rem; margin-bottom: 1rem; }
  .scan-bar select, .scan-bar .seg { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: .45rem .6rem; font-size: .88rem; font-family: inherit; }
  .seg-group { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .seg { border: none; border-radius: 0; cursor: pointer; } .seg.on { background: var(--brand); color: #fff; }
  .muted { color: var(--muted); } .row-gap { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
  .tier-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; max-width: 800px; margin: 1.5rem auto 0; }
  .price-card { margin: 0; text-align: center; }
  .price-card.featured { border-color: var(--brand); box-shadow: 0 0 0 1px var(--brand), var(--shadow); }
  .tier-name { font-weight: 800; font-size: 1.05rem; margin-bottom: .3rem; display:flex; gap:.4rem; align-items:center; justify-content:center; }
  .tier-list { list-style: none; padding: 0; margin: .9rem 0 1.1rem; text-align: left; font-size: .85rem; color: var(--muted); display: flex; flex-direction: column; gap: .35rem; }
  .tier-list b { color: var(--text); }
  .fnd-actions { display: flex; gap: .4rem; margin-top: .6rem; }
  .sec-status a { color: var(--brand-2); text-decoration: underline; }
  .fix-modal { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: grid; place-items: center; z-index: 100; padding: 1rem; }
  .fix-box { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; width: min(820px, 96vw); max-height: 88vh; display: flex; flex-direction: column; box-shadow: var(--shadow); }
  .fix-head { display: flex; align-items: center; gap: .6rem; padding: .8rem 1rem; border-bottom: 1px solid var(--line); font-weight: 700; }
  .fix-head .fnd-loc { margin-left: 0; font-weight: 400; }
  .fix-head .btn { margin-left: auto; }
  .fix-pre { margin: 0; padding: 1rem; overflow: auto; font-size: .8rem; white-space: pre; font-family: ui-monospace, monospace; flex: 1; }
  .fix-foot { display: flex; align-items: center; gap: .6rem; padding: .7rem 1rem; border-top: 1px solid var(--line); }
  .fix-foot .muted { flex: 1; font-size: .8rem; }
  @media (max-width: 720px) { .sec-feats, .tier-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header class="nav">
  <a href="/" class="brand">Yield <span class="logo">🛡 Security</span></a>
  <nav class="nav-links">
    <a href="/app">Builder</a>
    <a href="/pricing">Pricing</a>
    <a id="acct" href="/login" class="btn ghost sm">Sign in</a>
  </nav>
</header>

<main class="sec-page" id="page">
  <div class="sec-hero"><span class="pill">Loading…</span></div>
</main>

<script>
const $ = (s, r = document) => r.querySelector(s);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
const scoreClass = (s) => s >= 85 ? 'ok' : s >= 60 ? 'warn' : s >= 40 ? 'bad' : 'crit';
const sevClass = (v) => ({ CRITICAL:'crit', HIGH:'bad', MEDIUM:'warn', LOW:'low' })[v] || 'low';
let STATE = { tier:'none', projects:[], github:{connected:false}, level:'detailed', dailyCap:3, scanning:false };

function findingCard(f, i) {
  const loc = f.location ? `${esc(f.location.file||'')}:${f.location.line||0}` : '';
  const ex = f.example && (f.example.vulnerable || f.example.safe)
    ? `<div class="fnd-ex"><div class="ex-bad"><span>✗ vulnerable</span><pre>${esc(f.example.vulnerable||'')}</pre></div><div class="ex-ok"><span>✓ safe</span><pre>${esc(f.example.safe||'')}</pre></div></div>` : '';
  const fixable = f.location && f.location.file && f.location.file.indexOf('.') > -1; // a real file we can rewrite
  const actions = (i != null) ? `<div class="fnd-actions">
      ${fixable ? `<button class="btn ghost sm" data-act="fix" data-i="${i}">✨ AI Fix</button>` : ''}
      <button class="btn ghost sm" data-act="ignore" data-i="${i}">🙈 Ignore</button></div>` : '';
  return `<div class="fnd ${sevClass(f.severity)}"><div class="fnd-head">
      <span class="sev ${sevClass(f.severity)}">${esc(f.severity)}</span><b>${esc((f.type||'').replace(/_/g,' '))}</b>
      <span class="fnd-cwe">${esc(f.cwe||'')}</span>${f.source==='ai'?`<span class="fnd-ai">🤖 ${esc(f.model||'AI')}</span>`:'<span class="fnd-pat">pattern</span>'}
      <span class="fnd-loc">${loc}</span></div>
      <div class="fnd-owasp">${esc(f.owasp||'')}</div><div class="fnd-desc">${esc(f.description||'')}</div>
      ${f.fix?`<div class="fnd-fix"><b>Fix:</b> ${esc(f.fix)}</div>`:''}${ex}${actions}</div>`;
}

// Re-render the findings list with action buttons + wire them.
function paintFindings() {
  const list = $('#secFindings'); if (!list) return;
  const fs = STATE.findings || [];
  list.innerHTML = fs.length ? fs.map((f, i) => findingCard(f, i)).join('') : (STATE.scanning ? '<div class="muted">Scanning…</div>' : '');
  list.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', () => {
    const f = STATE.findings[+b.dataset.i]; if (!f) return;
    if (b.dataset.act === 'ignore') doIgnore(f, b);
    else doFix(f, b);
  }));
}

async function doIgnore(f, btn) {
  btn.disabled = true; btn.textContent = '…';
  try {
    await fetch('/api/security/ignores', { method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ source: STATE.sourceKey, type: f.type, file: f.location.file, line: f.location.line }) });
    STATE.findings = STATE.findings.filter(x => x !== f); paintFindings();
  } catch { btn.disabled = false; btn.textContent = '🙈 Ignore'; }
}

async function doFix(f, btn) {
  if (STATE.tier !== 'pro' && !STATE.unlimited) { subscribe(); return; }
  btn.disabled = true; btn.textContent = '✨ Generating…';
  try {
    const payload = { ...STATE.src, file: f.location.file, line: f.location.line, finding: f };
    const r = await fetch('/api/security/fix', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(payload) }).then(x => x.json());
    if (r.fixedContent) showFixModal(f, r.fixedContent, payload);
    else alert(r.error || 'Could not generate a fix.');
  } catch { alert('Fix failed — try again.'); }
  finally { btn.disabled = false; btn.textContent = '✨ AI Fix'; }
}

function showFixModal(f, fixed, payload) {
  const m = document.createElement('div'); m.className = 'fix-modal';
  m.innerHTML = `<div class="fix-box">
    <div class="fix-head">✨ AI Fix — ${esc((f.type||'').replace(/_/g,' '))} <span class="fnd-loc">${esc(f.location.file)}</span>
      <button class="btn ghost sm" id="fixClose">✕</button></div>
    <pre class="fix-pre">${esc(fixed)}</pre>
    <div class="fix-foot"><span class="muted">Review the rewritten file, then apply it to ${payload.source === 'repo' ? 'your repo' : 'your project'}.</span>
      <button class="btn ghost sm" id="fixCopy">Copy</button>
      <button class="btn primary sm" id="fixApply">Apply fix →</button></div></div>`;
  document.body.appendChild(m);
  const close = () => m.remove();
  $('#fixClose', m).onclick = close;
  m.addEventListener('click', e => { if (e.target === m) close(); });
  $('#fixCopy', m).onclick = () => { navigator.clipboard?.writeText(fixed); $('#fixCopy', m).textContent = 'Copied'; };
  $('#fixApply', m).onclick = async () => {
    const b = $('#fixApply', m); b.disabled = true; b.textContent = 'Applying…';
    try {
      const r = await fetch('/api/security/fix', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ ...payload, apply: true }) }).then(x => x.json());
      if (r.applied) { b.textContent = '✓ Applied'; STATE.findings = STATE.findings.filter(x => x !== f); paintFindings(); setTimeout(close, 900); }
      else { b.disabled = false; b.textContent = 'Apply fix →'; alert(r.applyError || r.error || 'Could not apply automatically — copy the code instead.'); }
    } catch { b.disabled = false; b.textContent = 'Apply fix →'; }
  };
}

// ---- exports (client-side, from the current scan) ----
function download(name, text, mime) {
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([text], { type: mime })); a.download = name; a.click(); URL.revokeObjectURL(a.href);
}
function toSarif() {
  const rules = {}; const results = (STATE.findings||[]).map(f => {
    rules[f.type] = { id: f.type, name: f.type, shortDescription: { text: f.type }, properties: { cwe: f.cwe, 'security-severity': ({CRITICAL:'9.5',HIGH:'8.0',MEDIUM:'5.0',LOW:'3.0'})[f.severity] } };
    return { ruleId: f.type, level: ({CRITICAL:'error',HIGH:'error',MEDIUM:'warning',LOW:'note'})[f.severity]||'warning',
      message: { text: f.description }, locations: [{ physicalLocation: { artifactLocation: { uri: f.location.file }, region: { startLine: f.location.line || 1, startColumn: f.location.column || 1 } } }] };
  });
  return JSON.stringify({ $schema: 'https://json.schemastore.org/sarif-2.1.0.json', version: '2.1.0',
    runs: [{ tool: { driver: { name: 'Yield Security', informationUri: 'https://yield', rules: Object.values(rules) } }, results }] }, null, 2);
}
function exportAs(fmt) {
  const stamp = new Date().toISOString().slice(0,10);
  if (fmt === 'sarif') return download(`yield-security-${stamp}.sarif`, toSarif(), 'application/json');
  if (fmt === 'json') return download(`yield-security-${stamp}.json`, JSON.stringify(STATE.result, null, 2), 'application/json');
  // printable HTML report
  const fs = STATE.findings || [];
  const html = `<!doctype html><meta charset=utf-8><title>Yield Security report</title>
    <style>body{font:14px system-ui;margin:2rem;color:#111}h1{margin:.2rem 0}.s{font-weight:700}.c{color:#b00}.h{color:#c60}.m{color:#a80}.l{color:#888}pre{background:#f5f5f5;padding:.4rem;border-radius:4px;white-space:pre-wrap}</style>
    <h1>🛡 Yield Security report</h1><p>${esc(STATE.sourceKey||'')} · ${stamp} · code health <b>${STATE.result?.codeHealthScore??'—'}/100</b> · ${fs.length} findings</p>
    ${fs.map(f=>`<div style="border-left:3px solid #ccc;padding:.3rem .6rem;margin:.5rem 0"><span class="s ${({CRITICAL:'c',HIGH:'h',MEDIUM:'m',LOW:'l'})[f.severity]}">${f.severity}</span> <b>${esc(f.type)}</b> · ${esc(f.cwe)} · ${esc(f.location.file)}:${f.location.line}<br>${esc(f.description||'')}<br><b>Fix:</b> ${esc(f.fix||'')}</div>`).join('')}`;
  download(`yield-security-${stamp}.html`, html, 'text/html');
}

async function load() {
  let s;
  try { s = await fetch('/api/security/status').then(r => r.json()); }
  catch { $('#page').innerHTML = '<div class="sec-hero"><p class="muted">Could not load. Try again.</p></div>'; return; }
  STATE.tier = s.tier || (s.active ? 'pro' : 'none'); STATE.projects = s.projects || []; STATE.github = s.github || { connected:false };
  STATE.priceConfigured = s.priceConfigured; STATE.loginRequired = s.loginRequired; STATE.dailyCap = s.dailyCap || 3; STATE.unlimited = s.unlimited;
  STATE.level = STATE.tier === 'pro' ? 'detailed' : 'basic';
  $('#acct').textContent = s.github && s.github.login ? '@'+s.github.login : (s.loginRequired ? 'Sign in' : 'Account');
  $('#acct').href = s.loginRequired ? '/login?redirect=/security' : '/app';
  STATE.tier === 'none' ? renderPitch() : renderDashboard();
}

function renderPitch() {
  const cwes = ['SQL injection','XSS','Auth bypass','Crypto failures','Hardcoded secrets','PII exposure','Command injection','Path traversal','CORS/CSRF','Vulnerable deps'];
  const subscribeBtn = STATE.loginRequired
    ? `<a class="btn primary lg" href="/login?redirect=/security">Sign in to start</a>`
    : (STATE.priceConfigured ? `<button class="btn primary lg" id="subBtn">Subscribe & start scanning</button>`
      : `<button class="btn primary lg" disabled title="Billing not configured yet">Launching soon</button>`);
  $('#page').innerHTML = `
    <div class="sec-hero">
      <span class="pill">🛡 Yield Security</span>
      <h1>Find the vulnerabilities before attackers do.</h1>
      <p class="lead">Scan your GitHub repos and Yield projects for real, exploitable security flaws — checked by a deterministic engine <b>and every top AI model</b>, one at a time. Your code is analyzed and discarded immediately; only the findings are kept.</p>
      <div class="cwe-row">${cwes.map(c => `<span class="cwe-chip">${c}</span>`).join('')}</div>
    </div>
    <div class="sec-feats">
      <div class="sec-feat"><h3>🧪 SAST + SCA + IaC</h3><p>One scan covers code flaws, known-vulnerable dependencies (with CVEs), and infra/config misconfigs — Dockerfiles, GitHub Actions, committed .env.</p></div>
      <div class="sec-feat"><h3>🤖 AI ensemble</h3><p>Beyond the pattern engine, every top AI model audits the code one at a time and findings are merged — agreement raises confidence.</p></div>
      <div class="sec-feat"><h3>✨ One-click AI fix</h3><p>For any finding, generate the corrected file and apply it straight to your repo or Yield project — review the diff first.</p></div>
      <div class="sec-feat"><h3>🙈 Triage & ignore</h3><p>Mark false positives or accepted risks; they're excluded from your score and future scans. Findings have a real lifecycle.</p></div>
      <div class="sec-feat"><h3>📤 Export anywhere</h3><p>Download SARIF (for GitHub code scanning / CI), JSON, or a shareable report. Plus a 0–100 code-health score and trend.</p></div>
      <div class="sec-feat"><h3>🔒 Privacy first</h3><p>Code is analyzed and discarded immediately. We keep only the finding type, severity, CWE, file and line — never your source.</p></div>
    </div>
    <div class="tier-grid">
      <div class="price-card">
        <div class="tier-name">Free</div>
        <div class="amt">$0</div>
        <ul class="tier-list"><li>✓ Basic pattern scans</li><li>✓ ${3} scans / day</li><li>✓ Projects & repos</li><li>✗ AI ensemble</li><li>✗ Compliance mode</li></ul>
        <a class="btn ghost" href="/login?redirect=/security">Start free</a>
      </div>
      <div class="price-card featured">
        <div class="tier-name">Pro <span class="pill" style="margin:0">popular</span></div>
        <div class="amt">$19 <small>/ mo</small></div>
        <ul class="tier-list"><li>✓ Everything in Free</li><li>✓ <b>AI ensemble</b> — every top model</li><li>✓ Compliance (GDPR/PCI)</li><li>✓ Unlimited repos & projects</li><li>✓ Score history & trends</li></ul>
        ${subscribeBtn}
      </div>
      <div class="price-card">
        <div class="tier-name">Team</div>
        <div class="amt">$49 <small>/ mo</small></div>
        <ul class="tier-list"><li>✓ Everything in Pro</li><li>✓ Shared org repos</li><li>✓ Priority scanning</li><li>✓ Email support</li></ul>
        <a class="btn ghost" href="mailto:bobitho69@gmail.com?subject=Yield%20Security%20Team">Contact us</a>
      </div>
    </div>
    <p class="muted" style="text-align:center;font-size:.76rem;margin-top:1rem">Sold separately from Priority. Code is analyzed and discarded immediately — only findings are kept.</p>`;
  $('#subBtn')?.addEventListener('click', subscribe);
}

// Start the Pro subscription checkout (or send to sign-in first).
async function subscribe() {
  if (STATE.loginRequired) { location.href = '/login?redirect=/security'; return; }
  try {
    const { url, error } = await fetch('/api/security/checkout', { method:'POST' }).then(r => r.json());
    if (url) location.href = url; else alert(error || 'Subscription isn’t available yet.');
  } catch { alert('Could not start checkout. Please try again.'); }
}

function renderDashboard() {
  const isPro = STATE.tier === 'pro';
  const projOpts = STATE.projects.map(p => `<option value="project:${esc(p.id)}">${esc(p.title)}</option>`).join('');
  const gh = STATE.github.connected
    ? `<button class="btn ghost sm" id="loadRepos">Load GitHub repos</button><select id="repoSel" class="hidden"></select>`
    : `<a class="btn ghost sm" href="/api/auth/github/login?scope=repo&store_token=1&redirect=/security">🔗 Connect GitHub</a>`;
  const lock = isPro ? '' : ' data-locked="1"';
  const banner = isPro ? '' : `<div class="sec-upsell" style="margin:0 0 1rem">⚡ You're on <b>Free</b> — basic pattern scans, ${STATE.dailyCap}/day. Upgrade to <b>Pro</b> for the AI ensemble, compliance mode and unlimited scans. <button class="btn primary sm" id="upBtn">Upgrade — $19/mo</button></div>`;
  $('#page').innerHTML = `
    <div class="sec-hero" style="padding-bottom:.5rem"><span class="pill">🛡 Yield Security — ${isPro ? 'Pro' : 'Free'}${STATE.unlimited ? ' · testing (unlimited)' : ''}</span>
      <h1 style="font-size:1.8rem">Scan a repo or project</h1></div>
    ${banner}
    <div class="scan-bar">
      <select id="srcSel" title="Source to scan">
        <optgroup label="Yield projects">${projOpts || '<option disabled>No projects yet</option>'}</optgroup>
      </select>
      ${gh}
      <span class="seg-group">
        <button class="seg ${STATE.level === 'basic' ? 'on' : ''}" data-lvl="basic">⚡ Basic</button>
        <button class="seg ${STATE.level === 'detailed' ? 'on' : ''}"${lock} data-lvl="detailed">🔬 Deep${isPro ? '' : ' 🔒'}</button>
        <button class="seg ${STATE.level === 'compliance' ? 'on' : ''}"${lock} data-lvl="compliance">📋 Compliance${isPro ? '' : ' 🔒'}</button>
      </span>
      <button class="btn primary" id="scanBtn">Scan ▸</button>
      <a class="btn ghost sm" href="/app">← Builder</a>
    </div>
    <div id="secStatus" class="sec-status"></div>
    <div class="sec-top" id="secSummary" style="display:none">
      <div class="sec-score" id="secScore"><div class="ss-num">—</div><div class="ss-lbl">Code Health</div></div>
      <div class="sec-sum" id="secCounts"></div>
    </div>
    <div id="secTrend" class="sec-trend"></div>
    <div id="secFindings" class="sec-findings"></div>
    <div class="sec-privacy">🔒 Code is analyzed and discarded immediately. Only finding metadata (type, severity, CWE, file, line, score) is retained.</div>`;
  document.querySelectorAll('.seg').forEach(b => b.addEventListener('click', () => {
    if (b.dataset.locked) { subscribe(); return; }
    document.querySelectorAll('.seg').forEach(x => x.classList.toggle('on', x === b)); STATE.level = b.dataset.lvl;
  }));
  $('#upBtn')?.addEventListener('click', subscribe);
  const lr = $('#loadRepos');
  if (lr) lr.addEventListener('click', async () => {
    lr.textContent = 'Loading…';
    try { const { repos } = await fetch('/api/security/repos').then(r => r.json());
      const sel = $('#repoSel'); sel.innerHTML = (repos||[]).map(r => `<option value="repo:${esc(r.full_name)}" data-branch="${esc(r.default_branch)}">${esc(r.full_name)}${r.private?' 🔒':''}</option>`).join('');
      sel.classList.remove('hidden'); lr.classList.add('hidden');
    } catch { lr.textContent = 'Retry'; }
  });
  $('#scanBtn').addEventListener('click', runScan);
}

function pickedSource() {
  const repoSel = $('#repoSel');
  if (repoSel && !repoSel.classList.contains('hidden') && repoSel.value) {
    return { source:'repo', repo: repoSel.value.slice(5), branch: repoSel.selectedOptions[0]?.dataset.branch || 'main', key: repoSel.value };
  }
  const v = $('#srcSel')?.value || '';
  if (v.startsWith('project:')) return { source:'project', projectId: v.slice(8), key: v };
  return null;
}

async function runScan() {
  if (STATE.scanning) return;
  const src = pickedSource();
  if (!src) { $('#secStatus').textContent = 'Pick a project or repo first.'; return; }
  STATE.scanning = true; STATE.src = { source: src.source, projectId: src.projectId, repo: src.repo, branch: src.branch };
  STATE.sourceKey = src.key; STATE.findings = []; STATE.result = null;
  const status = $('#secStatus'), summary = $('#secSummary');
  summary.style.display = 'none'; paintFindings();
  status.innerHTML = `<span class="spin"></span> Scanning ${esc(src.repo || 'project')} — static suite (SAST + deps + IaC)${STATE.level !== 'basic' ? ' then every top model…' : '…'}`;
  try {
    const res = await fetch('/api/security/scan', {
      method:'POST', headers:{'content-type':'application/json', accept:'text/event-stream'},
      body: JSON.stringify({ ...src, level: STATE.level, stream: true }),
    });
    if (!res.ok || !res.body || !res.headers.get('content-type')?.includes('text/event-stream')) {
      const err = await res.json().catch(() => ({}));
      status.innerHTML = err.code === 'github_not_connected'
        ? `Connect GitHub first. <a href="/api/auth/github/login?scope=repo&store_token=1&redirect=/security" style="color:var(--brand-2)">Connect →</a>`
        : esc(err.error || `Scan failed (${res.status})`);
      return;
    }
    const reader = res.body.pipeThrough(new TextDecoderStream()).getReader();
    let buf = '';
    for (;;) {
      const { value, done } = await reader.read(); if (done) break; buf += value;
      let i; while ((i = buf.indexOf('\n\n')) !== -1) {
        const frame = buf.slice(0, i); buf = buf.slice(i + 2);
        const ev = /event: (.*)/.exec(frame)?.[1], data = /data: ([\s\S]*)/.exec(frame)?.[1];
        if (!ev || data == null) continue;
        let p; try { p = JSON.parse(data); } catch { continue; }
        if (ev === 'finding') { STATE.findings.push(p); paintFindings(); }
        else if (ev === 'progress' && p.stage === 'ai') status.innerHTML = `<span class="spin"></span> ${esc(p.model)} (${p.index}/${p.total}) — ${STATE.findings.length} finding(s) so far`;
        else if (ev === 'done') renderResult(p, src.key);
        else if (ev === 'error') status.textContent = p.message || 'Scan error';
      }
    }
  } catch (e) { status.textContent = 'Scan interrupted: ' + e; }
  finally { STATE.scanning = false; }
}

function renderResult(r, sourceKey) {
  STATE.result = r; STATE.findings = r.findings; STATE.scanning = false;
  $('#secStatus').innerHTML = `✓ Scan complete — code health ${r.codeHealthScore}/100 (${r.summary.total} findings) · `
    + `<a href="#" data-exp="sarif">SARIF</a> · <a href="#" data-exp="json">JSON</a> · <a href="#" data-exp="html">Report</a>`;
  $('#secStatus').querySelectorAll('[data-exp]').forEach(a => a.addEventListener('click', (e) => { e.preventDefault(); exportAs(a.dataset.exp); }));
  const sum = r.summary, sc = $('#secScore'); $('#secSummary').style.display = 'flex';
  sc.className = 'sec-score ' + scoreClass(r.codeHealthScore);
  sc.innerHTML = `<div class="ss-num">${r.codeHealthScore}</div><div class="ss-lbl">Code Health</div>`;
  $('#secCounts').innerHTML = `<span class="sev crit">${sum.critical} critical</span> <span class="sev bad">${sum.high} high</span> <span class="sev warn">${sum.medium} medium</span> <span class="sev low">${sum.low} low</span>`;
  if (!r.findings.length) $('#secFindings').innerHTML = '<div class="sec-clean">✓ No vulnerabilities found. Clean.</div>';
  else paintFindings();
  loadTrend(sourceKey);
}

async function loadTrend(sourceKey) {
  try {
    const { runs } = await fetch('/api/security/history?source=' + encodeURIComponent(sourceKey)).then(r => r.json());
    const el = $('#secTrend'); if (!el || !runs || runs.length < 2) { if (el) el.innerHTML = ''; return; }
    const series = runs.slice().reverse(), w = 240, h = 40, n = series.length;
    const pts = series.map((r, i) => `${(i/(n-1))*w},${h-(r.score/100)*h}`).join(' ');
    el.innerHTML = `<div class="trend-head">Security trend (${n} scans)</div><svg viewBox="0 0 ${w} ${h}" class="trend-svg" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="currentColor" stroke-width="2"/></svg><span class="trend-now">latest ${series[n-1].score}/100</span>`;
  } catch { /* optional */ }
}

load();
</script>
</body>
