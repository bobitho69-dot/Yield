name: Deploy to Cloudflare Workers

# Optional CI deploy. Cloudflare's native "Connect to Git" (see docs/DEPLOY.md,
# Option A) needs no workflow at all. Use this only if you prefer GitHub Actions.
#
# Requires repo secrets:  CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Worker app secrets (NVIDIA_API_KEY, etc.) are set once in the Cloudflare dashboard.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
