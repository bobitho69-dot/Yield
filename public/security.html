<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yield Security</title>
<meta name="description" content="Yield Security — scan your GitHub repos and projects for vulnerabilities with a live advisory feed and every top AI model. SAST, SCA, IaC, secrets, AI auto-fix, continuous monitoring.">
<link rel="stylesheet" href="/styles.css">
<style>
  :root { --crit:#f0566d; --high:#f59e57; --med:#e8c24a; --low:#6f9bd1; --ok:#3ecf8e; }
  body.sec-app { height:100vh; overflow:hidden; }
  .app { display:grid; grid-template-columns:248px 1fr; height:100vh; overflow:hidden; }
  /* Sidebar */
  .sb { background:#0e1119; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:1rem .8rem; gap:.2rem; overflow-y:auto; min-height:0; }
  .sb-brand { display:flex; align-items:center; gap:.55rem; padding:.3rem .5rem 1rem; }
  .sec-mark { color:var(--brand-2); flex:0 0 auto; }
  .sec-word-wrap { display:flex; flex-direction:column; line-height:1.14; min-width:0; }
  .sec-word { font-family:var(--font-display,inherit); font-weight:700; font-size:1.05rem; letter-spacing:-.01em; }
  .sec-by { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; font-weight:600; }
  .sb-sec { font-size:.66rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); padding:.9rem .6rem .3rem; }
  .sb-item { display:flex; align-items:center; gap:.6rem; padding:.5rem .6rem; border-radius:9px; color:var(--muted); font-size:.9rem; font-weight:500; cursor:pointer; transition:.12s; }
  .sb-item:hover { background:var(--panel-2); color:var(--text); }
  .sb-item.active { background:#1b1740; color:#fff; box-shadow:inset 2px 0 0 var(--brand); }
  .sb-item .ic { width:18px; text-align:center; }
  .sb-item .lock { margin-left:auto; font-size:.7rem; opacity:.7; }
  .sb-foot { margin-top:auto; display:flex; flex-direction:column; gap:.2rem; padding-top:.8rem; border-top:1px solid var(--line); }
  .tier-chip { font-size:.7rem; font-weight:800; padding:.2rem .55rem; border-radius:999px; align-self:flex-start; margin:.2rem .5rem .4rem; }
  .tier-chip.pro { background:var(--brand-2); color:#04231d; }
  .tier-chip.free { background:#222a3a; color:var(--muted); }
  /* Main */
  .main { display:flex; flex-direction:column; min-width:0; min-height:0; }
  .topbar { display:flex; align-items:center; gap:1rem; padding:1rem 1.6rem; border-bottom:1px solid var(--line); flex:0 0 auto; background:var(--bg); }
  .topbar h1 { font-size:1.25rem; margin:0; letter-spacing:-.01em; }
  .topbar .sub { color:var(--muted); font-size:.82rem; }
  .top-actions { margin-left:auto; display:flex; gap:.5rem; align-items:center; }
  .content { flex:1 1 auto; min-height:0; overflow-y:auto; overflow-x:hidden; padding:1.8rem 2rem 3rem; scroll-behavior:smooth; background:var(--bg); }
  .content > * { max-width:1320px; margin-left:auto; margin-right:auto; }
  .content::-webkit-scrollbar{width:11px} .content::-webkit-scrollbar-thumb{background:#2a3242;border-radius:6px;border:3px solid var(--bg)} .content::-webkit-scrollbar-track{background:transparent}
  /* KPI cards */
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1rem; margin-bottom:1.4rem; }
  .kpi { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:1.1rem 1.2rem; }
  .kpi .k-label { color:var(--muted); font-size:.78rem; display:flex; align-items:center; gap:.4rem; }
  .kpi .k-num { font-size:2.1rem; font-weight:800; letter-spacing:-.02em; margin-top:.3rem; line-height:1; }
  .kpi .k-sub { font-size:.74rem; color:var(--muted); margin-top:.35rem; }
  .kpi.crit .k-num { color:var(--crit); } .kpi.ok .k-num { color:var(--ok); }
  /* Panels */
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:1.2rem; margin-bottom:1.4rem; }
  .panel h2 { font-size:.95rem; margin:0 0 1rem; display:flex; align-items:center; gap:.5rem; }
  .panel h2 .right { margin-left:auto; font-size:.78rem; color:var(--muted); font-weight:400; }
  .grid2 { display:grid; grid-template-columns:1.4fr 1fr; gap:1.4rem; }
  @media (max-width:900px){ .grid2{ grid-template-columns:1fr; } }
  /* Severity distribution bar */
  .sevbar { display:flex; height:14px; border-radius:7px; overflow:hidden; background:var(--panel-2); }
  .sevbar i { display:block; }
  .sevbar i.c{background:var(--crit)} .sevbar i.h{background:var(--high)} .sevbar i.m{background:var(--med)} .sevbar i.l{background:var(--low)}
  .sevlegend { display:flex; flex-wrap:wrap; gap:.8rem; margin-top:.8rem; font-size:.8rem; color:var(--muted); }
  .sevlegend b { color:var(--text); }
  .dot { width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:.35rem; }
  .dot.c{background:var(--crit)} .dot.h{background:var(--high)} .dot.m{background:var(--med)} .dot.l{background:var(--low)}
  /* Score ring */
  .ring svg{transform:rotate(-90deg)} .ring .bg{stroke:var(--panel-2)} .ring text{fill:var(--text);font-size:16px;font-weight:800;transform:rotate(90deg);transform-origin:center}
  .ring .fg{animation:ringin 1s cubic-bezier(.4,0,.2,1) both}
  @keyframes ringin{from{stroke-dashoffset:var(--circ)}to{stroke-dashoffset:var(--off)}}
  /* trend chart + usage */
  .lchart{width:100%;height:auto;display:block} .lc-ax{fill:var(--muted);font-size:10px}
  .spark polyline{stroke-linecap:round}
  .usage{display:flex;align-items:center;gap:.7rem} .ubar{flex:1;max-width:240px;height:8px;border-radius:4px;background:var(--panel-2);overflow:hidden} .ubar i{display:block;height:100%;background:var(--brand-2);transition:width .6s}
  /* skeleton loaders */
  .skel{height:88px;border-radius:14px;border:1px solid var(--line);margin-bottom:1rem;background:linear-gradient(90deg,var(--panel) 25%,var(--panel-2) 37%,var(--panel) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite}
  .kpis .skel{height:96px;margin:0}
  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
  /* hover polish */
  .kpi{transition:transform .15s,border-color .15s} .kpi:hover{transform:translateY(-2px);border-color:#3a4257}
  .cap,.gs,.how,.repo-row,.icard,.ov-card{transition:border-color .15s,transform .15s} .cap:hover,.repo-row:hover,.icard:hover{border-color:#3a4257}
  .panel{transition:border-color .15s}
  /* Tables */
  table.tbl { width:100%; border-collapse:collapse; }
  table.tbl th { text-align:left; font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); padding:.5rem .6rem; border-bottom:1px solid var(--line); font-weight:600; }
  table.tbl td { padding:.6rem; border-bottom:1px solid var(--line); font-size:.86rem; vertical-align:middle; }
  table.tbl tr:last-child td { border-bottom:none; }
  table.tbl tr.clickable { cursor:pointer; } table.tbl tr.clickable:hover td { background:var(--panel-2); }
  .src-name { font-family:ui-monospace,monospace; font-size:.8rem; }
  .mono { font-family:ui-monospace,monospace; font-size:.78rem; color:var(--muted); }
  /* Severity pill */
  .pill2 { font-size:.68rem; font-weight:800; padding:.12rem .5rem; border-radius:6px; letter-spacing:.02em; }
  .pill2.CRITICAL{background:rgba(240,86,109,.16);color:var(--crit)} .pill2.HIGH{background:rgba(245,158,87,.16);color:var(--high)}
  .pill2.MEDIUM{background:rgba(232,194,74,.16);color:var(--med)} .pill2.LOW{background:rgba(111,155,209,.16);color:var(--low)}
  .src-tag{font-size:.66rem;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:.05rem .35rem}
  .src-tag.ai{color:var(--brand-2);border-color:#18443c}
  /* Finding detail row */
  .fdetail td { background:#0d1017; padding:1rem 1.2rem; }
  .fdetail .fd-grid { display:grid; gap:.8rem; }
  .fd-desc{font-size:.88rem;line-height:1.5} .fd-fix{font-size:.86rem;color:var(--text);background:rgba(62,207,142,.08);border-left:3px solid var(--ok);padding:.5rem .7rem;border-radius:0 6px 6px 0}
  .fd-ex{display:grid;grid-template-columns:1fr 1fr;gap:.6rem} .fd-ex pre{margin:.2rem 0 0;padding:.5rem .6rem;border-radius:6px;font-size:.76rem;white-space:pre-wrap;overflow:auto}
  .ex-bad pre{background:#2a1416;border:1px solid #5a2530;color:#fca5a5} .ex-ok pre{background:#102a1a;border:1px solid #1e4d31;color:#86efac}
  .fd-actions{display:flex;gap:.5rem;margin-top:.3rem}
  /* Filters */
  .filters{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
  .fchip{font-size:.78rem;padding:.3rem .65rem;border:1px solid var(--line);border-radius:999px;cursor:pointer;color:var(--muted);background:var(--panel)}
  .fchip.on{background:var(--brand);color:#fff;border-color:transparent}
  .search{flex:1;min-width:160px;max-width:320px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.4rem .7rem;color:var(--text);font-family:inherit}
  /* Scan view */
  .scanwrap{max-width:760px}
  .field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
  .field label{font-size:.82rem;color:var(--muted);font-weight:600}
  .field select,.field input{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:.6rem .7rem;color:var(--text);font-family:inherit;font-size:.9rem}
  .seg-group{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg{padding:.5rem .9rem;border:none;background:var(--panel);color:var(--muted);cursor:pointer;font-family:inherit;font-size:.85rem}
  .seg.on{background:var(--brand);color:#fff}
  .scan-status{display:flex;align-items:center;gap:.5rem;color:var(--brand-2);font-size:.86rem;min-height:1.3rem;margin:1rem 0}
  /* Integrations */
  .integ-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
  .icard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:1.1rem}
  .icard h3{margin:.2rem 0 .3rem;font-size:.95rem;display:flex;align-items:center;gap:.5rem}
  .icard .st{font-size:.72rem;padding:.1rem .45rem;border-radius:999px;margin-left:auto}
  .icard .st.on{background:rgba(62,207,142,.16);color:var(--ok)} .icard .st.off{background:#222a3a;color:var(--muted)}
  .icard input{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:7px;padding:.45rem .6rem;color:var(--text);font-family:inherit;font-size:.83rem;margin-top:.5rem}
  label.chk{display:inline-flex;align-items:center;gap:.4rem;font-size:.82rem;color:var(--muted);cursor:pointer}
  .icard label.chk{margin-top:.6rem}
  .empty{text-align:center;color:var(--muted);padding:2.4rem 1rem}
  .empty .big{font-size:2.8rem;margin-bottom:.6rem}
  .empty h2{color:var(--text);margin:.2rem 0 .4rem} .empty p{max-width:520px;margin:.2rem auto 1.1rem;line-height:1.55}
  .welcome{margin-bottom:1.4rem} .welcome h2{font-size:1.4rem;margin:0 0 .3rem} .welcome p{color:var(--muted);max-width:720px;line-height:1.55;margin:0}
  /* capability cards */
  .cap-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:.9rem}
  .cap{display:flex;gap:.7rem;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:.9rem}
  .cap-ic{font-size:1.5rem;width:42px;height:42px;border-radius:10px;background:var(--panel);display:grid;place-items:center;flex:0 0 auto}
  .cap h3{margin:0 0 .2rem;font-size:.88rem} .cap p{margin:0;font-size:.78rem;color:var(--muted);line-height:1.45}
  /* getting started */
  .gs-list{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
  .gs{display:flex;gap:.7rem;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:1rem}
  .gs.done{border-color:#1e4d31;background:rgba(62,207,142,.06)}
  .gs-n{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;flex:0 0 auto;font-size:.9rem}
  .gs.done .gs-n{background:var(--ok)}
  .gs b{font-size:.9rem} .gs p{margin:.25rem 0 .6rem;font-size:.78rem;color:var(--muted);line-height:1.4}
  /* how it works */
  .how-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1rem}
  .how{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:1rem}
  .how-ic{font-size:1.6rem;margin-bottom:.4rem} .how b{font-size:.9rem} .how p{margin:.3rem 0 0;font-size:.8rem;color:var(--muted);line-height:1.45}
  /* repo list */
  .repo-list{display:flex;flex-direction:column;gap:.4rem;max-height:340px;overflow:auto}
  .repo-row{display:flex;align-items:center;justify-content:space-between;gap:.6rem;padding:.5rem .7rem;background:var(--panel-2);border:1px solid var(--line);border-radius:9px}
  @media (max-width:820px){ .gs-list,.how-grid{grid-template-columns:1fr} }
  .toast{position:fixed;bottom:18px;left:50%;transform:translate(-50%,14px);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.6rem .9rem;font-size:.85rem;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.2s}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  /* Fix modal */
  .fix-modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:grid;place-items:center;z-index:100;padding:1rem}
  .fix-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(860px,96vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .fix-head{display:flex;align-items:center;gap:.6rem;padding:.9rem 1.1rem;border-bottom:1px solid var(--line);font-weight:700}
  .fix-pre{margin:0;padding:1rem;overflow:auto;font-size:.8rem;white-space:pre;font-family:ui-monospace,monospace;flex:1}
  .fix-foot{display:flex;align-items:center;gap:.6rem;padding:.8rem 1.1rem;border-top:1px solid var(--line)}
  /* Marketing (logged out) */
  .mkt{max-width:1000px;margin:0 auto;padding:2rem 5vw 4rem}
  .mkt-hero{text-align:center;padding:2rem 0}
  .mkt-hero h1{font-size:clamp(2rem,5vw,3.4rem);letter-spacing:-.03em;margin:.5rem 0}
  .mkt-hero p{color:var(--muted);font-size:1.1rem;max-width:640px;margin:.6rem auto 1.4rem;line-height:1.6}
  .mkt-feats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:2rem 0}
  .mkt-feat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:1.1rem;text-align:left}
  .mkt-feat h3{margin:.2rem 0 .4rem;font-size:1rem} .mkt-feat p{margin:0;font-size:.88rem;color:var(--muted);line-height:1.5}
  .tier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:820px;margin:1.5rem auto 0}
  .tcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1.3rem;text-align:center}
  .tcard.feat{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand)}
  .tcard .amt{font-size:2.2rem;font-weight:800} .tcard .amt small{font-size:1rem;color:var(--muted)}
  .tcard ul{list-style:none;padding:0;margin:1rem 0;text-align:left;font-size:.85rem;color:var(--muted);display:flex;flex-direction:column;gap:.35rem}
  @media (max-width:820px){ .mkt-feats,.tier-grid{grid-template-columns:1fr} .grid2{grid-template-columns:1fr}
    .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    .sb{flex-direction:row;align-items:center;height:auto;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:.5rem .8rem;gap:.3rem}
    .sb-brand,.sb-sec,.sb-foot,.tier-chip{display:none} .sb-item{white-space:nowrap} }
  /* Category badges + fills (SAST/SCA/IaC/Secrets/License) */
  .cat-badge{font-size:.66rem;font-weight:700;padding:.12rem .5rem;border-radius:6px;white-space:nowrap;display:inline-flex;align-items:center;gap:.25rem;border:1px solid transparent}
  .cat-SAST{background:rgba(111,155,209,.14);color:#9bc0ea;border-color:rgba(111,155,209,.26)}
  .cat-SCA{background:rgba(62,207,142,.13);color:#5fe0a6;border-color:rgba(62,207,142,.26)}
  .cat-IaC{background:rgba(168,130,255,.14);color:#bfa6ff;border-color:rgba(168,130,255,.28)}
  .cat-Secrets{background:rgba(240,86,109,.14);color:#f58ea0;border-color:rgba(240,86,109,.28)}
  .cat-License{background:rgba(232,194,74,.14);color:#ecd47a;border-color:rgba(232,194,74,.28)}
  .cat-dot{width:8px;height:8px;border-radius:3px;display:inline-block;margin-right:.5rem;flex:0 0 auto}
  .cat-dot.cat-SAST{background:#6f9bd1} .cat-dot.cat-SCA{background:#3ecf8e} .cat-dot.cat-IaC{background:#a882ff} .cat-dot.cat-Secrets{background:#f0566d} .cat-dot.cat-License{background:#e8c24a}
  .cat-fill-SAST{background:linear-gradient(90deg,#6f9bd1,#4d7fbc)} .cat-fill-SCA{background:linear-gradient(90deg,#3ecf8e,#22a06b)} .cat-fill-IaC{background:linear-gradient(90deg,#a882ff,#7d54e0)} .cat-fill-Secrets{background:linear-gradient(90deg,#f0566d,#c33147)} .cat-fill-License{background:linear-gradient(90deg,#e8c24a,#caa01f)}
  .fchip.cat.on{background:#222a3a;color:var(--text);border-color:#3a4257}
  /* Findings summary header */
  .f-summary{display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap}
  .fs-left{display:flex;align-items:center;gap:1rem}
  .fs-num{font-size:2rem;font-weight:800;line-height:1;letter-spacing:-.02em}
  .fs-sev{display:flex;gap:1.3rem;flex-wrap:wrap}
  .fs-pill{display:flex;flex-direction:column;align-items:center;gap:.22rem;min-width:46px}
  .fs-pill b{font-size:1.25rem;font-weight:800;line-height:1}
  .fdiv{width:1px;height:22px;background:var(--line);margin:0 .2rem}
  .fgroup{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.42rem .6rem;color:var(--text);font-family:inherit;font-size:.82rem;cursor:pointer}
  /* table panel (flush table inside a card) + grouped headers */
  .tbl-panel{padding:0;overflow:hidden}
  .tbl-panel .tbl th:first-child,.tbl-panel .tbl td:first-child{padding-left:1.1rem} .tbl-panel .tbl th:last-child,.tbl-panel .tbl td:last-child{padding-right:1.1rem}
  .grp-head{display:flex;align-items:center;gap:.6rem;padding:.65rem 1.1rem;border-bottom:1px solid var(--line);background:var(--panel-2)}
  .grp-n{margin-left:auto;font-size:.74rem;color:var(--muted);font-weight:700}
  .chev{color:var(--muted);text-align:right;width:26px}
  /* dashboard analytics: top issues + category breakdown */
  .catbars{display:flex;flex-direction:column;gap:.95rem}
  .catbar{cursor:pointer} .catbar .cb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem;font-size:.82rem} .catbar .cb-top b{font-weight:800}
  .cb-track{height:9px;border-radius:5px;background:var(--panel-2);overflow:hidden} .cb-fill{display:block;height:100%;transition:width .7s cubic-bezier(.4,0,.2,1)}
  .catbar:hover .cb-track{outline:1px solid #3a4257}
  .ti-list{display:flex;flex-direction:column;gap:.6rem}
  .ti-row{display:grid;grid-template-columns:1fr 92px 30px;align-items:center;gap:.7rem;font-size:.82rem;cursor:pointer}
  .ti-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;color:var(--text)}
  .ti-track{height:8px;border-radius:4px;background:var(--panel-2);overflow:hidden} .ti-track i{display:block;height:100%;transition:width .7s cubic-bezier(.4,0,.2,1)}
  .ti-n{font-weight:800;text-align:right} .ti-row:hover .ti-name{color:#fff}

  /* ======================= v2 — command center ======================= */
  :root{
    --bg:#0a0c11; --bg-2:#0f131b; --panel:#141823; --panel-2:#1a1f2b; --panel-3:#212838;
    --line:#222836; --line-2:#2d3445; --line-top:rgba(255,255,255,.05);
    --r-chip:6px; --r-sm:9px; --r:12px; --r-lg:14px; --r-xl:18px;
    --grad-brand:var(--brand-2);
    --grad-crit:var(--crit);
    --shadow-lift:0 14px 34px -12px rgba(0,0,0,.7);
    --crit-bg:rgba(240,86,109,.13); --high-bg:rgba(245,158,87,.13); --med-bg:rgba(232,194,74,.13); --low-bg:rgba(111,155,209,.13); --ok-bg:rgba(62,207,142,.13);
  }
  /* tabular numerals on every metric so nothing jitters */
  .k-num,.fs-num,.fs-pill b,.ring text,.gauge-num,.delta,.ti-n,.sc-chip,.ff-cnt,.cov-n,.don-num,.kpi .k-sub b{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  /* flat matte panels — no glass-edge gradient wallpaper */
  .kpi,.hero-card,.src-card{background:var(--panel);box-shadow:inset 0 1px 0 var(--line-top),0 1px 2px rgba(0,0,0,.35)}
  .kpi:hover,.src-card:hover{border-color:var(--line-2);box-shadow:inset 0 1px 0 var(--line-top),var(--shadow-lift);transform:translateY(-2px)}

  @media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}

  .gauge .arc-val{animation:gdraw 1.05s cubic-bezier(.4,0,.2,1) both}

  /* Fix-first worklist */
  .ff-list{display:flex;flex-direction:column}

  /* KPI tile refinements */

  .kpi.crit-glow{box-shadow:inset 0 1px 0 var(--line-top),0 0 0 1px rgba(240,86,109,.4)}
  .kpi-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}

  .delta.up{background:var(--ok-bg);color:var(--ok)} .delta.down{background:var(--crit-bg);color:var(--crit)} .delta.flat{background:var(--panel-2);color:var(--muted)}
  /* severity donut */

  .dl.c .sw{background:var(--crit)} .dl.h .sw{background:var(--high)} .dl.m .sw{background:var(--med)} .dl.l .sw{background:var(--low)}
  /* source / repo cards */
  .src-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
  .src-card{border:1px solid var(--line);border-radius:var(--r-lg);padding:1rem 1.05rem;cursor:pointer;display:flex;flex-direction:column;gap:.7rem}
  .sc-top{display:flex;align-items:center;gap:.5rem}
  .sc-kind{font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:var(--muted);border:1px solid var(--line-2);border-radius:5px;padding:.05rem .3rem}

  .sc-foot{display:flex;align-items:center;justify-content:space-between;gap:.5rem}

  /* coverage capability wall */
  .cov-grid{display:flex;flex-direction:column;gap:.55rem}

  .cov-n{font-size:.72rem;color:var(--muted);font-weight:700}

  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(62,207,142,.5);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(62,207,142,.45)}70%{box-shadow:0 0 0 7px rgba(62,207,142,0)}100%{box-shadow:0 0 0 0 rgba(62,207,142,0)}}
  /* trend crosshair tooltip */
  .trend-wrap{position:relative}
  .tt{position:absolute;pointer-events:none;background:var(--panel-3);border:1px solid var(--line-2);border-radius:8px;padding:.4rem .6rem;font-size:.74rem;box-shadow:var(--shadow);transform:translate(-50%,-115%);white-space:nowrap;opacity:0;transition:opacity .1s;z-index:5}
  .tt b{font-variant-numeric:tabular-nums}
  .lc-cross{stroke:var(--line-2);stroke-width:1;opacity:0}

  .lc-pulse{animation:lpulse 1.8s ease-out infinite}

  /* getting-started progress */

  /* shaped skeletons */

  .reveal{animation:rise .42s cubic-bezier(.2,.7,.3,1) both}

  .ghosted{opacity:.5;pointer-events:none}
  /* category/issue meters are analytics on the dashboard (drill-down is via source cards) */

  /* neutral magnitude bars for ranked issue types — category identity is the dot, not the fill (keeps red=critical everywhere) */
  .ti-fill{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,#414a63,#5d678a);transition:width .7s cubic-bezier(.4,0,.2,1)}
  /* donut hover: dim siblings, lift the hovered segment */
  .donut:hover .seg{opacity:.45} .donut .seg:hover{opacity:1;stroke-width:16}
  /* findings: severity left-rail for fast triage + AI-fixable marker (the autofix story, surfaced not buried) */
  tr.frow td:first-child{border-left:3px solid var(--rail,transparent)}
  .rail-CRITICAL{--rail:var(--crit)} .rail-HIGH{--rail:var(--high)} .rail-MEDIUM{--rail:var(--med)} .rail-LOW{--rail:var(--low)}
  .aifix{color:var(--brand-2);filter:drop-shadow(0 0 4px rgba(0,212,180,.45))}

<body class="sec-app">
<div id="root"></div>

<script>
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const sc = s => s>=85?'ok':s>=60?'warn':s>=40?'bad':'crit';
const ago = t => { if(!t) return ''; const d=Math.floor(Date.now()/1000-t); if(d<60)return 'just now'; if(d<3600)return Math.floor(d/60)+'m ago'; if(d<86400)return Math.floor(d/3600)+'h ago'; return Math.floor(d/86400)+'d ago'; };
let S = { tier:'none', projects:[], github:{}, level:'detailed', view:'dashboard', findings:[], result:null, src:null, sourceKey:null, overview:null, filter:{sev:'all',q:'',cat:'all',group:'none'} };
// Scanner category for a finding type.
const CATS=['SAST','SCA','IaC','Secrets','License'];
const CAT_ICON={SAST:'flask',SCA:'package',IaC:'container',Secrets:'key',License:'file'};
const catIco=(c,s=14)=>I(CAT_ICON[c]||'flask',s);
function catOf(t){ t=t||''; if(t==='DEPENDENCY_VULN')return 'SCA'; if(t==='LICENSE_RISK')return 'License'; if(/SECRET/.test(t))return 'Secrets'; if(/^IAC_|^CONTAINER_/.test(t))return 'IaC'; return 'SAST'; }

function toast(m){ let e=$('#toast'); if(!e){e=document.createElement('div');e.id='toast';e.className='toast';document.body.appendChild(e);} e.textContent=m; e.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>e.classList.remove('show'),3000); }

let _uid=0;
// Animated, gradient score ring.
function ring(score, size=72){ const r=(size-9)/2, c=2*Math.PI*r, off=c*(1-(score||0)/100), id='rg'+(++_uid);
  const col=({ok:['#3ecf8e','#22a06b'],warn:['#e8c24a','#caa01f'],bad:['#f59e57','#d97a2f'],crit:['#f0566d','#c33147']})[sc(score||0)];
  return `<span class="ring" style="width:${size}px;height:${size}px;display:inline-block"><svg width="${size}" height="${size}">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${col[0]}"/><stop offset="1" stop-color="${col[1]}"/></linearGradient></defs>
    <circle class="bg" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="7"/>
    <circle class="fg" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#${id})" stroke-width="7" stroke-linecap="round" stroke-dasharray="${c}" style="--circ:${c};--off:${off}"/>
    <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle">${score??'—'}</text></svg></span>`; }
const BANDCOL={ok:'#3ecf8e',warn:'#e8c24a',bad:'#f59e57',crit:'#f0566d'};
// Honest area+line trend (straight segments, draw-in, last-point pulse, hover crosshair).
function lineChart(series, w=600, h=164){
  if(!series||series.length<2) return `<div class="empty" style="padding:1.5rem"><p class="mono">Your security trend builds here once you've run a few scans.</p></div>`;
  const n=series.length, pad=12, iw=w-pad*2, ih=h-pad*2-12, id='la'+(++_uid);
  const X=i=>pad+(i/(n-1))*iw, Y=v=>pad+ih-((v||0)/100)*ih;
  const pts=series.map((s,i)=>({x:+X(i).toFixed(1),y:+Y(s.score).toFixed(1),s:s.score||0,t:s.total,c:s.critical,w:s.created_at}));
  const line=pts.map(p=>`${p.x},${p.y}`).join(' ');
  let plen=0; for(let i=1;i<pts.length;i++){ plen+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y); }
  const last=pts[n-1], col=BANDCOL[sc(last.s)];
  return `<div class="trend-wrap" data-pts='${esc(JSON.stringify(pts))}'>
    <svg viewBox="0 0 ${w} ${h}" class="lchart" preserveAspectRatio="xMidYMid meet">
      <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".28"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
      ${[0,50,100].map(g=>`<line x1="${pad}" x2="${w-pad}" y1="${Y(g)}" y2="${Y(g)}" stroke="var(--line)" stroke-width="1" opacity=".55"/>`).join('')}
      <polygon points="${pad},${pad+ih} ${line} ${pad+iw},${pad+ih}" fill="url(#${id})"/>
      <polyline class="lc-line" points="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" style="--plen:${plen.toFixed(0)}" stroke-dasharray="${plen.toFixed(0)}"/>
      <line class="lc-cross" x1="0" y1="${pad}" x2="0" y2="${pad+ih}"/>
      <circle cx="${last.x}" cy="${last.y}" r="3.5" fill="${col}"/>
      <circle class="lc-pulse" cx="${last.x}" cy="${last.y}" r="3.5" fill="none" stroke="${col}" stroke-width="2"/>
      <text x="${pad}" y="${h-2}" class="lc-ax">${n} scans</text><text x="${w-pad}" y="${h-2}" text-anchor="end" class="lc-ax">latest ${last.s}/100</text>
    </svg><div class="tt"></div></div>`; }
function wireTrend(root){ const wrap=$('.trend-wrap',root); if(!wrap)return; let pts; try{pts=JSON.parse(wrap.dataset.pts)}catch{return} const svg=$('.lchart',wrap),cross=$('.lc-cross',wrap),tt=$('.tt',wrap),n=pts.length;
  wrap.onmousemove=e=>{ const r=svg.getBoundingClientRect(); if(!r.width)return; let i=Math.round((e.clientX-r.left)/r.width*(n-1)); i=Math.max(0,Math.min(n-1,i)); const p=pts[i];
    cross.setAttribute('x1',p.x); cross.setAttribute('x2',p.x); cross.style.opacity='1';
    tt.style.left=(p.x/600*r.width)+'px'; tt.style.top=(p.y/164*r.height)+'px'; tt.style.opacity='1';
    tt.innerHTML=`${ago(p.w)||'—'} · score <b>${p.s}</b>${p.c!=null?` · <b>${p.c}</b> crit`:''}`; };
  wrap.onmouseleave=()=>{ cross.style.opacity='0'; tt.style.opacity='0'; }; }
function sparkline(series, w=88, h=24){ if(!series||series.length<2) return ''; const vals=series.map(s=>s.score||0),n=vals.length,col=BANDCOL[sc(vals[n-1])],id='sp'+(++_uid);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1, Y=v=>(h-3-((v-mn)/rng)*(h-6)); // auto-scale to the series range so shape is visible
  const P=vals.map((v,i)=>`${(i/(n-1)*w).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" style="vertical-align:middle;overflow:visible"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".24"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><polygon points="0,${h} ${P} ${w},${h}" fill="url(#${id})"/><polyline points="${P}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${w}" cy="${Y(vals[n-1]).toFixed(1)}" r="2" fill="${col}"/></svg>`; }
function skel(n=3){ return `<div>${Array(n).fill('<div class="skel"></div>').join('')}</div>`; }

// ---- count-up (hero only) ----
function countUp(el,target,ms=850){ if(!el)return; if(window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches){el.textContent=target;return;}
  const t0=performance.now(); (function step(t){ const k=Math.min(1,(t-t0)/ms); el.textContent=Math.round((1-(1-k)**3)*target); if(k<1)requestAnimationFrame(step); })(t0); }

// ---- POSTURE GAUGE: one rounded 270° arc, one number, one grade word ----
function gauge(score){ const cx=100,cy=92,r=76, id='ga'+(++_uid), v=Math.max(0,Math.min(100,score||0));
  const polar=(deg)=>{ const a=deg*Math.PI/180; return [cx+r*Math.cos(a), cy-r*Math.sin(a)]; };
  const [sx,sy]=polar(225), [ex,ey]=polar(-45);
  const arcD=`M ${sx.toFixed(1)} ${sy.toFixed(1)} A ${r} ${r} 0 1 1 ${ex.toFixed(1)} ${ey.toFixed(1)}`;
  const C=2*Math.PI*r, arc=C*0.75, valLen=arc*v/100;
  const band=sc(v), col=({ok:['#3ecf8e','#22a06b'],warn:['#e8c24a','#caa01f'],bad:['#f59e57','#d97a2f'],crit:['#f0566d','#c33147']})[band];
  const grade=({ok:'Strong',warn:'Fair',bad:'At risk',crit:'Critical'})[band];
  return `<div class="gauge-wrap"><svg class="gauge" width="200" height="150" viewBox="0 0 200 150" role="img" aria-label="Security posture ${v} of 100, ${grade}">
    <defs><linearGradient id="${id}" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="${col[1]}"/><stop offset="1" stop-color="${col[0]}"/></linearGradient></defs>
    <path d="${arcD}" fill="none" stroke="var(--panel-3)" stroke-width="14" stroke-linecap="round"/>
    <path class="arc-val" d="${arcD}" fill="none" stroke="url(#${id})" stroke-width="14" stroke-linecap="round" stroke-dasharray="${valLen.toFixed(1)} ${(C).toFixed(0)}" style="--len:${valLen.toFixed(1)};--goff:0"/>
    <text class="gauge-num" x="100" y="90" text-anchor="middle" fill="var(--text)" style="font-size:38px;font-weight:800;letter-spacing:-.02em">${v}</text>
    <text x="100" y="112" text-anchor="middle" class="gauge-grade" fill="${col[0]}">${grade}</text>
  </svg></div>`; }

// ---- SEVERITY DONUT (real C/H/M/L) ----
function donut(c,h,m,l,size=132){ const r=46,cx=size/2,cy=size/2,C=2*Math.PI*r, id='dn'+(++_uid);
  const total=c+h+m+l, segs=[['c',c,'var(--crit)'],['h',h,'var(--high)'],['m',m,'var(--med)'],['l',l,'var(--low)']];
  let off=0; const circles=segs.filter(s=>s[1]>0).map(([k,val,color])=>{ const f=val/(total||1), len=Math.max(0,f*C-3), dash=`${len} ${C-len}`, o=off; off-=f*C;
    return `<circle class="seg arc-seg" data-k="${k}" r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="${color}" stroke-width="14" stroke-dasharray="${dash}" stroke-dashoffset="${o.toFixed(1)}" stroke-linecap="butt"><title>${({c:'Critical',h:'High',m:'Medium',l:'Low'})[k]}: ${val}</title></circle>`; }).join('');
  return `<div class="donut-wrap"><svg class="donut" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="var(--panel-2)" stroke-width="14"/>
    <g transform="rotate(-90 ${cx} ${cy})">${circles}</g>
    <text class="don-num" x="${cx}" y="${cy-2}" text-anchor="middle" fill="var(--text)">${total}</text>
    <text x="${cx}" y="${cy+15}" text-anchor="middle" fill="var(--muted)" style="font-size:11px">findings</text></svg>
    <div class="don-legend">${[['c','Critical',c],['h','High',h],['m','Medium',m],['l','Low',l]].map(([k,nm,val])=>`<span class="dl ${k}"><span class="sw"></span>${nm}<b>${val}</b></span>`).join('')}</div></div>`; }

// ---- delta chip: only meaningful on a coherent (single-source) series ----
function deltaChip(curr,prev,goodUp=true){ if(prev==null||curr==null) return ''; const d=curr-prev; if(d===0) return `<span class="delta flat">±0</span>`;
  const better=goodUp?d>0:d<0; return `<span class="delta ${better?'up':'down'}">${d>0?'▲':'▼'}${Math.abs(d)}</span>`; }

// ---- KPI tile ----
function kpiTile(o){ // {label,num,sub,acc,spark,delta,glow,span}
  return `<div class="kpi ${o.span||''} ${o.acc||''} ${o.glow?'crit-glow':''}"><div class="kpi-head"><div class="k-label">${o.label}</div>${o.delta||''}</div>
    <div class="k-num">${o.num}</div><div class="k-sub">${o.sub||''}</div>${o.spark?`<div class="spark">${o.spark}</div>`:''}</div>`; }

// ---- per-source history cache (avoids refetch storms on re-render) ----
const HIST={};
async function loadSpark(key){ if(HIST[key]!==undefined) return HIST[key]; HIST[key]=null;
  try{ const h=await api('/api/security/history?source='+encodeURIComponent(key)); HIST[key]=(h.runs||[]).slice().reverse().map(r=>({score:r.score})); }catch{ HIST[key]=[]; } return HIST[key]; }
function paintSparks(root){ $$('.sc-spark[data-src]',root).forEach(async el=>{ const key=el.dataset.src; const s=HIST[key]!==undefined?HIST[key]:await loadSpark(key); if(s&&s.length>1) el.innerHTML=sparkline(s,120,24); }); }

// ---- SOURCE / REPO card ----
function sourceCard(s, monitored){ const key=s.source, name=key.replace(/^(repo|project):/,''), isRepo=key.startsWith('repo:');
  const band=sc(s.score||0), col=BANDCOL[band], t=s.total||0, c=s.critical||0, h=s.high||0, m=s.medium||0, l=Math.max(0,t-c-h-m);
  const seg=(cls,val)=>val>0?`<i class="${cls}" style="width:${(val/(t||1)*100).toFixed(1)}%"></i>`:'';
  return `<div class="src-card" data-open="${esc(key)}" tabindex="0">
    <div class="sc-top"><span class="sc-kind">${isRepo?'repo':'project'}</span><span class="sc-name" title="${esc(name)}">${esc(name)}</span><span class="sc-chip" style="background:${col}22;color:${col}">${s.score??'—'}</span></div>
    <div class="sc-mbar">${seg('c',c)}${seg('h',h)}${seg('m',m)}${seg('l',l)||'<i style="width:100%;background:var(--panel-3)"></i>'}</div>
    <div class="sc-spark" data-src="${esc(key)}"></div>
    <div class="sc-foot"><span class="meta">${t} findings · ${ago(s.last_at)||'—'}</span>${isRepo?(monitored?`<button class="btn ghost sm" data-unmon="${esc(name)}" onclick="event.stopPropagation()">${I('belloff',14)}</button>`:`<button class="btn ghost sm" data-mon="${esc(name)}" onclick="event.stopPropagation()">${I('bell',14)} Monitor</button>`):'<span class="src-tag">project</span>'}</div></div>`; }

// ---- FIX FIRST: worst sources, ranked (honest — opens the source's real history) ----
function fixFirst(sources){ const ranked=sources.filter(s=>(s.total||0)>0).slice().sort((a,b)=>(b.critical||0)-(a.critical||0)||(b.high||0)-(a.high||0)||(a.score||0)-(b.score||0)).slice(0,6);
  if(!ranked.length) return `<div class="empty" style="padding:1.6rem"><div class="big">${I('checkcircle',40)}</div><p>No open critical or high issues across your sources. Nice.</p></div>`;
  return `<div class="ff-list">${ranked.map((s,i)=>{ const name=s.source.replace(/^(repo|project):/,''), sev=s.critical?'sev-crit':s.high?'sev-high':'';
    return `<div class="ff-row ${sev}" data-open="${esc(s.source)}" tabindex="0"><span class="ff-rank">${i+1}</span>
      <span class="ff-name"><span class="nm" title="${esc(name)}">${esc(name)}</span><span class="sub">${s.source.startsWith('repo:')?'repository':'project'} · health ${s.score??'—'}</span></span>
      <span class="ff-counts">${s.critical?`<span class="ff-cnt c">${s.critical} crit</span>`:''}${s.high?`<span class="ff-cnt h">${s.high} high</span>`:''}</span>
      <span class="ff-go">Open →</span></div>`; }).join('')}</div>`; }

// ---- COVERAGE: capability wall (lit = scanner active; count = findings seen) ----
function coverageStrip(topTypes, monitors, scanned){ const {agg}=catAgg(topTypes); const fresh=monitors&&monitors.length?Math.max(...monitors.map(m=>m.last_scan_at||0)):0;
  return `<div class="cov-grid">${CATS.map(cat=>`<div class="cov-row"><div class="cov-ic">${catIco(cat,18)}</div>
    <div class="cov-name">${cat}${scanned?'<span class="st">● active</span>':''}</div>
    <div class="cov-n">${agg[cat]?agg[cat]+' found':(scanned?'clean':'—')}</div></div>`).join('')}</div>
    <div class="cov-foot">${scanned?'<span class="live-dot"></span>':''}${fresh?`Monitored · last scan ${ago(fresh)}`:'5 scanners run on every scan'}</div>`; }

function catBreakdown(topTypes){

  const list=(topTypes||[]).slice(0,n); if(!list.length) return `<div class="empty" style="padding:1.4rem"><p class="mono">No issues to rank yet — run a scan.</p></div>`;

async function doScan(src){
  S.src={source:src.source,projectId:src.projectId,repo:src.repo,branch:src.branch}; S.sourceKey=src.key; S.findings=[]; S.result=null;
  const st=$('#sstatus'); if(!st) return; st.innerHTML=`<span class="spin"></span> Scanning <b>${esc(src.repo||'project')}</b> — SAST · SCA · IaC · license${S.level!=='basic'?' · AI ensemble':''}…`;
  $('#sresult').innerHTML='';
  try{
    const res=await fetch('/api/security/scan',{method:'POST',headers:{'content-type':'application/json',accept:'text/event-stream'},body:JSON.stringify({...src,level:S.level,stream:true})});
    if(!res.ok||!res.body||!res.headers.get('content-type')?.includes('text/event-stream')){ const e=await res.json().catch(()=>({})); st.innerHTML = e.code==='github_not_connected'?`Connect GitHub first. <a href="/api/auth/github/login?scope=repo&store_token=1&redirect=/security" style="color:var(--brand-2)">Connect →</a>`:(e.code==='security_required'?`${I('lock',13)} ${esc(e.error)} <a href="#" onclick="subscribe();return false" style="color:var(--brand-2)">Upgrade →</a>`:esc(e.error||`Scan failed (${res.status})`)); return; }
    const rd=res.body.pipeThrough(new TextDecoderStream()).getReader(); let buf='';
    for(;;){ const {value,done}=await rd.read(); if(done)break; buf+=value; let i; while((i=buf.indexOf('\n\n'))!==-1){ const fr=buf.slice(0,i); buf=buf.slice(i+2); const ev=/event: (.*)/.exec(fr)?.[1], dt=/data: ([\s\S]*)/.exec(fr)?.[1]; if(!ev||dt==null)continue; let p; try{p=JSON.parse(dt)}catch{continue}
      if(ev==='finding'){ S.findings.push(p); st.querySelector('b')&&(st.innerHTML=`<span class="spin"></span> ${S.findings.length} finding(s)…`); }
      else if(ev==='progress'&&p.stage==='ai') st.innerHTML=`<span class="spin"></span> ${I('cpu',14)} ${esc(p.model)} (${p.index}/${p.total}) — ${S.findings.length} so far`;
      else if(ev==='done'){ S.result=p; S.findings=p.findings; scanDone(p); }
      else if(ev==='error') st.textContent=p.message||'Scan error';
    }}
  }catch(e){ st.textContent='Scan interrupted: '+e; }
}

  const r=await api('/api/security/fix',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({...S.src,file:f.location.file,line:f.location.line,finding:f})});

// Fix every fixable finding at once — writes + commits one file at a time, no per-finding review.
async function doFixAll(btn,onDone){
  if(S.tier!=='pro'&&!S.unlimited){ subscribe(); return; }
  if(!S.src){ alert('Run a scan first.'); return; }
  const fixable=fixableFindings(S.findings);
  if(!fixable.length) return;
  const dest=S.src.source==='repo'?`${S.src.repo}@${S.src.branch||'main'} (a real commit)`:'your project';
  if(!confirm(`AI-fix ${fixable.length} finding(s) and commit the corrected files to ${dest}?`)) return;
  const t=btn.innerHTML; btn.disabled=true; btn.innerHTML=`${I('sparkle',14)} Fixing & committing…`;
  const r=await api('/api/security/fix-all',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({...S.src,findings:fixable,apply:true})});
  btn.disabled=false; btn.innerHTML=t;
  if(!r.results){ alert(r.error||'Bulk fix failed.'); return; }
  const fixedFiles=new Set(r.results.filter(x=>x.applied).map(x=>x.file));
  const failed=r.results.filter(x=>!x.applied).length;
  if(fixedFiles.size) S.findings=S.findings.filter(f=>!fixedFiles.has(f.location?.file));
  if(fixedFiles.size) toast(`Fixed & committed ${fixedFiles.size} file${fixedFiles.size>1?'s':''}${r.skipped?` (${r.skipped} skipped — too many files, run again)`:''}`);
  if(failed && !fixedFiles.size) toast(`Couldn't auto-fix ${failed} file${failed>1?'s':''} — try them individually`);
  if(S.result) S.result.findings=S.findings;
  (onDone||(()=>{}))();
}
function fixModal(f,fixed,payload){
  const m=document.createElement('div'); m.className='fix-modal';
  m.innerHTML=`<div class="fix-box"><div class="fix-head">${I('sparkle',14)} AI Fix — ${esc((f.type||'').replace(/_/g,' '))} <span class="mono">${esc(f.location.file)}</span><button class="btn ghost sm" id="fxX" style="margin-left:auto">✕</button></div>
    <pre class="fix-pre">${esc(fixed)}</pre>
    <div class="fix-foot"><span class="mono" style="flex:1">Review the rewritten file, then apply it to your ${payload.source==='repo'?'repo (a commit)':'project'}.</span><button class="btn ghost sm" id="fxCopy">Copy</button><button class="btn primary sm" id="fxApply">Apply fix →</button></div></div>`;
  document.body.appendChild(m); const close=()=>m.remove();
  $('#fxX',m).onclick=close; m.onclick=e=>{if(e.target===m)close()};
  $('#fxCopy',m).onclick=()=>{navigator.clipboard?.writeText(fixed); $('#fxCopy',m).textContent='Copied';};
  $('#fxApply',m).onclick=async()=>{ const b=$('#fxApply',m); b.disabled=true; b.textContent='Applying…'; const r=await api('/api/security/fix',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({...payload,apply:true})});
    if(r.applied){ b.textContent='✓ Applied'; S.findings=S.findings.filter(x=>x!==f); toast('Fix applied'); setTimeout(close,800); } else { b.disabled=false; b.textContent='Apply fix →'; alert(r.applyError||r.error||'Could not apply — copy the code instead.'); } };
}
function download(name,text,mime){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:mime})); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
function exportAs(fmt){ const stamp=new Date().toISOString().slice(0,10), fs=S.findings||[];
  if(fmt==='json') return download(`yield-security-${stamp}.json`,JSON.stringify(S.result,null,2),'application/json');
  if(fmt==='sarif'){ const rules={}, results=fs.map(f=>{ rules[f.type]={id:f.type,name:f.type,properties:{cwe:f.cwe,'security-severity':({CRITICAL:'9.5',HIGH:'8',MEDIUM:'5',LOW:'3'})[f.severity]}}; return {ruleId:f.type,level:({CRITICAL:'error',HIGH:'error',MEDIUM:'warning',LOW:'note'})[f.severity]||'warning',message:{text:f.description},locations:[{physicalLocation:{artifactLocation:{uri:f.location.file},region:{startLine:f.location.line||1}}}]}; });
    return download(`yield-security-${stamp}.sarif`,JSON.stringify({version:'2.1.0',$schema:'https://json.schemastore.org/sarif-2.1.0.json',runs:[{tool:{driver:{name:'Yield Security',rules:Object.values(rules)}},results}]},null,2),'application/json'); }
  const html=`<!doctype html><meta charset=utf-8><title>Yield Security report</title><style>body{font:14px system-ui;margin:2rem;color:#111}.s{font-weight:700}pre{background:#f5f5f5;padding:.4rem;border-radius:4px;white-space:pre-wrap}</style><h1>Yield Security report</h1><p>${esc(S.sourceKey||'')} · ${stamp} · health <b>${S.result?.codeHealthScore??'—'}/100</b> · ${fs.length} findings</p>${fs.map(f=>`<div style="border-left:3px solid #ccc;padding:.3rem .6rem;margin:.5rem 0"><span class="s">${f.severity}</span> <b>${esc(f.type)}</b> · ${esc(f.cwe)} · ${esc(f.location.file)}:${f.location.line}<br>${esc(f.description||'')}<br><b>Fix:</b> ${esc(f.fix||'')}</div>`).join('')}`;
  download(`yield-security-${stamp}.html`,html,'text/html');
}

load();
</script>
