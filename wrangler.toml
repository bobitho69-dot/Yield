# Yield — Cloudflare Workers configuration
#
# The Worker serves both the API (/api/*) and the static frontend (./public).
# Fill in the placeholder IDs after you create the resources:
#   npm run db:create        -> copy the database_id below
#   npm run kv:create        -> copy the id below
# Secrets (never commit these) are set with `wrangler secret put <NAME>`.
# See .dev.vars.example for the full list.

name = "yield"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# --- Observability -------------------------------------------------------------
# Kept in the config (not just the dashboard) so every deploy — and local dev —
# applies the same logging/tracing settings and nothing drifts between deployments.
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

# --- Static frontend (chat UI, editor, preview shell) --------------------------
[assets]
directory = "./public"
binding = "ASSETS"
# Static pages (/, /app, /dashboard, ...) are served straight from ./public by
# Cloudflare's asset layer for free — html_handling maps "/app" -> app.html, etc.
# Only the API and dynamic previews run the Worker, which keeps billable Worker
# invocations (and thus cost) as low as possible on the free tier.
run_worker_first = [ "/api/*", "/p/*" ]
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

# --- D1: users, projects, files, subscriptions, usage ledger -------------------
[[d1_databases]]
binding = "DB"
database_name = "yield-db"
database_id = "ff477f86-f456-45e5-be97-e64a1adbb64c"

# --- KV: sessions, OAuth state, usage counters, feature flags ------------------
[[kv_namespaces]]
binding = "KV"
id = "22565cb87f544eb9aede82692e0681a9"

# --- Durable Object: runs app builds independently of the browser tab ----------
# A build runs inside a BuildSession DO, so it keeps going (and saves to D1 +
# GitHub) even if the user refreshes or closes the tab. Free on the Workers Free
# plan (SQLite-backed DOs). Reopened tabs re-attach to the live build stream.
[[durable_objects.bindings]]
name = "BUILDER"
class_name = "BuildSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BuildSession"]

# --- Cron: daily re-scan of monitored repos (Yield Security continuous monitoring) ----
[triggers]
crons = ["0 6 * * *"]

# --- Non-secret vars (override per environment) --------------------------------
[vars]
APP_NAME = "Yield"
APP_URL = "https://yield.bobitho69.workers.dev"

# NVIDIA endpoints (OpenAI-compatible chat + NemoGuard jailbreak classifier).
NVIDIA_CHAT_BASE = "https://integrate.api.nvidia.com/v1"
NVIDIA_JAILBREAK_URL = "https://ai.api.nvidia.com/v1/security/nvidia/nemoguard-jailbreak-detect/v1/classify"

# Builds are UNLIMITED in normal times (no per-user/daily caps — projects live in the
# user's own GitHub, so volume doesn't cost storage). The ONE exception is HIGH USAGE
# TIME: when monthly generations cross FREE_REQUEST_BUDGET (usage nearing Cloudflare's
# free ceiling, i.e. about to cost money), free + anonymous generation pauses and only
# Priority ($20/mo) members can build — that's what Priority funds. Set
# HIGH_USAGE_OVERRIDE="on" to force it manually (emergency pause).
FREE_REQUEST_BUDGET = "2500000"      # monthly generations before High Usage Time trips
FREE_DAILY_LIMIT = "15"              # (unused — no per-user daily limit)
ANON_DAILY_LIMIT = "3"               # (unused — no anonymous daily limit)
HIGH_USAGE_OVERRIDE = "auto"         # auto | on | off  (manual High Usage Time switch)

# Master auth switch. "false" = OPEN TESTING MODE: no login required, everyone acts
# as a shared guest, all limits off. Flip to "true" to require accounts (everything
# is already built — email/password + optional OAuth + billing gating turn on).
AUTH_ENABLED = "false"

# Stripe price for the $20/mo "Priority Access" plan (set the real price id).
STRIPE_PRICE_ID = "price_PLACEHOLDER"

# Stripe price for the standalone "Yield Security" monthly subscription (its own product:
# scan your GitHub repos + Yield projects for vulnerabilities). Set the real price id.
SECURITY_PRICE_ID = "price_SECURITY_PLACEHOLDER"

# Optional donations. Paste a one-off donation link and Yield shows "Support Yield"
# buttons (landing, footer, builder, and the /donate page) pointing to it. Leave
# empty to hide them. Easiest options: a Stripe Payment Link, Ko-fi, Buy Me a Coffee,
# or GitHub Sponsors — e.g. "https://ko-fi.com/yourname" or "https://buymeacoffee.com/yourname".
DONATE_URL = ""

# AI image generation. Preconfigured for NVIDIA FLUX.1-schnell and reuses your
# NVIDIA_API_KEY (no extra setup). Apps call window.YIELD.image().
IMAGE_API_URL = "https://ai.api.nvidia.com/v1/genai/black-forest-labs/flux.1-schnell"
IMAGE_API_MODEL = ""

# AI 3D-model generation (Microsoft TRELLIS via NVIDIA — reuses NVIDIA_API_KEY, no
# extra key). Apps call window.YIELD.model3d(prompt) and get back a .glb to render
# (e.g. with Google's <model-viewer>). 3D gen is slow, so apps should show a loader.
# Leave empty to disable the feature. VERIFY the exact hosted path at build.nvidia.com
# (the model is "microsoft/trellis"); the value below is the expected NVIDIA genai URL.
TRELLIS_API_URL = "https://ai.api.nvidia.com/v1/genai/microsoft/trellis"

# AI video generation (NVIDIA Cosmos via NVIDIA — reuses NVIDIA_API_KEY, no extra
# key). Apps call window.YIELD.video(prompt) and get back a video URL to play (great
# for background videos or scroll-to-play sites). Video gen is slow → apps show a
# loader. Leave empty to disable. VERIFY the exact hosted path at build.nvidia.com.
VIDEO_API_URL = "https://ai.api.nvidia.com/v1/genai/nvidia/cosmos3-nano-reasoner"
VIDEO_API_MODEL = ""

# Vision model — lets the builder "see" images you upload in chat (UI mockups,
# screenshots, logos, photos, diagrams). It runs as a pre-pass that describes the
# image(s) in detail, then feeds that to the coder. Default is NVIDIA-hosted (reuses
# NVIDIA_API_KEY). You can instead point it at a ZenMux vision model — e.g.
# "z-ai/glm-4.6v-flash-free" or "google/gemini-3.1-flash-lite-image-free" — and the
# pre-pass automatically uses the ZEMUZAPI key. Vision/image models run ONLY as this
# image pre-pass — they are never offered as coder models.
VISION_MODEL = "qwen/qwen3.5-397b-a17b"

# ── Yield AI — your OWN in-house model (optional) ──────────────────────────────
# Yield AI is not a third-party API — it's a model YOU self-host on a GPU you control
# (see the /yield-ai folder for the full setup: rent a GPU, run vLLM, paste the URL here).
# Set YIELD_AI_BASE_URL to your server's OpenAI-compatible endpoint and "Yield AI" shows
# up in the model picker, calling ONLY your box. Leave it blank and the model is hidden.
#   YIELD_AI_BASE_URL   your server, e.g. "https://<your-gpu-host>:8000/v1"
#   YIELD_AI_MODEL_ID   the --served-model-name you launched with (default "yield-ai")
# If your server needs a key (vLLM --api-key), set YIELD_AI_API_KEY as a real secret
# (`wrangler secret put YIELD_AI_API_KEY`) — do NOT put it here.
YIELD_AI_BASE_URL = ""
YIELD_AI_MODEL_ID = "yield-ai"

# OAuth is OPTIONAL — email + password login works without it. These placeholders
# let the app deploy today; the login UI auto-hides GitHub/Google until they're real.
# To enable later: put your real Client ID values here, and for each *_SECRET set a
# proper Cloudflare secret (Settings → Variables and Secrets) and delete its line here.
GITHUB_CLIENT_ID = "PLACEHOLDER_GITHUB_CLIENT_ID"
GITHUB_CLIENT_SECRET = "PLACEHOLDER_GITHUB_CLIENT_SECRET"
GOOGLE_CLIENT_ID = "PLACEHOLDER_GOOGLE_CLIENT_ID"
GOOGLE_CLIENT_SECRET = "PLACEHOLDER_GOOGLE_CLIENT_SECRET"

# "Sign in with Roblox" (OAuth 2.0 / OIDC) — OPTIONAL. Register an app at
# create.roblox.com → Creator Dashboard → Open Cloud → OAuth 2.0 Apps, set its
# redirect URI to "<APP_URL>/api/auth/roblox/callback", request the "openid profile"
# scopes, then put the Client ID here and set ROBLOX_CLIENT_SECRET as a real secret.
# Left as a placeholder, the "Sign in with Roblox" button auto-hides and the Studio
# plugin still links fine (via the link code, or with zero friction in testing mode).
ROBLOX_CLIENT_ID = "PLACEHOLDER_ROBLOX_CLIENT_ID"
ROBLOX_CLIENT_SECRET = "PLACEHOLDER_ROBLOX_CLIENT_SECRET"

# Secrets set via `wrangler secret put` (do NOT put real values here):
#   NVIDIA_API_KEY            nvapi-...  THE key for the whole NVIDIA catalog (every model, the router, the guard, images)
#   NVIDIA_API_KEY_BACKUP     nvapi-...  optional 2nd NVIDIA key — used automatically on a 429/402 (rate-limit/quota)
#   YIELDNVIDIAAIKEY          nvapi-...  optional DEDICATED key for the security-audit feature (so it's metered/keyed separately). Falls back to NVIDIA_API_KEY.
#   OPENROUTER_API_KEY        optional — only for Qwen3 Coder / Laguna (the two OpenRouter models). Omit and they just fall back.
#   ZEMUZAPI                  optional — ONE ZenMux (zenmux.ai) key for all its free models: the coder models Claude Sonnet 5 / Fable 5, GLM 4.7 Flash, Step 3.7 Flash, plus the ZenMux vision models (GLM-4.6V, Gemini image) when VISION_MODEL points at one. Omit and those models just fall back.
#   YIELD_AI_API_KEY          optional — the key your OWN Yield AI server expects (vLLM --api-key). Omit if your server has no auth. This is YOUR server's key, not a provider key.
#   GITHUB_WEBHOOK_SECRET     optional — enables Yield Security continuous monitoring (scan-on-push). Random 32+ byte string; set on the repo webhook automatically.
#   SESSION_SECRET            random 32+ byte string (HMAC for session cookies)
#   # GitHub/Google OAuth are OPTIONAL placeholder vars above (email+password works
#   # without them); promote the *_SECRET ones to real secrets when you enable OAuth.
#   STRIPE_SECRET_KEY         sk_live_... / sk_test_...
#   STRIPE_WEBHOOK_SECRET     whsec_...
