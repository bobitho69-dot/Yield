# Yield AI — one-command in-house model server (Docker Compose).
#
#   cd yield-ai
#   cp .env.example .env      # edit model / key / knobs
#   docker compose up         # pulls vLLM, downloads the model, serves it
#
# Needs the NVIDIA Container Toolkit on the host (so the container sees the GPU).
# Your endpoint after it boots:  http://<host>:8000/v1
services:
  yield-ai:
    build: .
    image: yield-ai
    restart: unless-stopped
    ports:
      - "${YIELD_AI_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Cache downloaded weights on the host so restarts don't re-download.
      - hf-cache:/root/.cache/huggingface
    ipc: host           # vLLM uses shared memory for tensor parallelism
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf-cache:
