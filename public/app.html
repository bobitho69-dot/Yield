<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yield — Builder</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="builder">
  <!-- High Usage / status banner -->
  <div id="banner" class="banner hidden"></div>

  <header class="topbar">
    <a class="brand sm" href="/"><span class="logo">◆</span> Yield</a>
    <a class="toplink" href="/dashboard">Projects</a>
    <a class="toplink" href="/settings">Settings</a>
    <a class="toplink" id="donateLink" href="/donate" title="Support Yield">💜 Donate</a>
    <input id="projectTitle" class="title-input" value="Untitled app" spellcheck="false" />
    <div class="top-actions">
      <span id="quota" class="quota"></span>
      <button id="ghBtn" class="btn ghost sm" title="Store code on GitHub">⎇ GitHub</button>
      <button id="upgradeBtn" class="btn primary sm hidden">Upgrade $20/mo</button>
      <div id="authArea"></div>
    </div>
  </header>

  <dialog id="ghDialog" class="gh-dialog">
    <div id="ghBody"></div>
    <form method="dialog" class="gh-close"><button class="btn ghost sm">Close</button></form>
  </dialog>

  <dialog id="histDialog" class="gh-dialog">
    <div id="histBody"></div>
    <form method="dialog" class="gh-close"><button class="btn ghost sm">Close</button></form>
  </dialog>

  <main class="workspace">
    <!-- Left: chat -->
    <section class="chat-pane">
      <div id="projectList" class="project-list"></div>
      <div id="messages" class="messages">
        <div class="empty-chat">
          <h2>What do you want to build?</h2>
          <p>Describe an app and Yield will generate it. Try “a markdown notes app with tags”.</p>
        </div>
      </div>
      <div id="queue" class="queue hidden"></div>
      <div id="selChip" class="sel-chip hidden"></div>
      <form id="composer" class="composer">
        <div class="composer-row">
          <div class="model-mini">
            <button id="modelBtn" type="button" class="model-btn" title="Choose AI model">
              <span class="model-btn-dot"></span>
              <span id="modelBtnLabel">Auto</span>
              <span class="caret">▾</span>
            </button>
            <div id="modelPanel" class="model-panel hidden"></div>
          </div>
          <select id="thinkingSel" class="think-sel" title="How hard the AI thinks before coding (higher = better, slower)">
            <option value="low">🧠 Fast</option>
            <option value="medium">🧠 Balanced</option>
            <option value="high">🧠 Max</option>
          </select>
          <button id="promptMaxBtn" type="button" class="pmax-btn" aria-pressed="false" title="Prompt Max — auto-improve your prompt before building">⚡ Prompt Max</button>
          <button id="attachBtn" type="button" class="attach-btn" title="Attach images or documents — Yield will read them">📎 Attach</button>
          <input id="fileInput" type="file" multiple accept="image/*,.pdf,.txt,.md,.markdown,.csv,.json,.html,.htm,.css,.js,.ts,.tsx,.jsx,.svg,.log,.yml,.yaml,text/*" hidden>
          <span id="autoPick" class="auto-pick"></span>
          <div class="row-spacer"></div>
          <button id="histBtn" type="button" class="btn ghost sm" title="Prompt history (saved to your GitHub)">📜 History</button>
          <button id="newBtn" type="button" class="btn ghost sm" title="New project">＋ New</button>
        </div>
        <div id="attachments" class="attachments hidden"></div>
        <div class="composer-input">
          <textarea id="prompt" rows="2" placeholder="Describe your app, or ask for a change…"></textarea>
          <button id="sendBtn" type="submit" class="btn primary send">Build ▸</button>
        </div>
        <div id="guardNote" class="guard-note">Prompts are screened by an automatic safety guard.</div>
      </form>
    </section>

    <!-- Right: preview / code -->
    <section class="preview-pane">
      <div class="tabs">
        <button class="tab active" data-tab="preview">Preview</button>
        <button class="tab" data-tab="code">Code</button>
        <button class="tab" data-tab="agents">Agents</button>
        <button class="tab" data-tab="settings">Settings</button>
        <div class="tab-spacer"></div>
        <select id="pageSel" class="btn ghost sm hidden" title="Preview a page"></select>
        <button id="selectBtn" class="btn ghost sm" title="Click an element in the preview to edit it">🎯 Select</button>
        <button id="refreshBtn" class="btn ghost sm">↻ Refresh</button>
        <button id="openBtn" class="btn ghost sm">↗ Open</button>
      </div>
      <div id="previewTab" class="tab-panel">
        <iframe id="preview" class="preview-frame"
          sandbox="allow-scripts allow-forms allow-modals allow-popups"
          title="App preview"></iframe>
      </div>
      <div id="agentsTab" class="tab-panel hidden"><div class="pane-scroll" id="agentsPane"></div></div>
      <div id="settingsTab" class="tab-panel hidden"><div class="pane-scroll" id="settingsPane"></div></div>
      <div id="codeTab" class="tab-panel hidden">
        <div class="code-wrap">
          <aside class="file-tree">
            <div class="file-tree-head"><span>Files</span><button id="newFileBtn" class="mini" title="New file">＋</button></div>
            <ul id="fileList"></ul>
          </aside>
          <div class="editor-col">
            <textarea id="codeEditor" class="code-editor" spellcheck="false" placeholder="Select a file to edit…"></textarea>
            <div class="code-actions">
              <span id="activePath" class="muted"></span>
              <div class="tab-spacer"></div>
              <button id="deleteFileBtn" class="btn ghost sm">Delete</button>
              <button id="applyCode" class="btn primary sm">Save file</button>
              <span id="saveState" class="save-state"></span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
