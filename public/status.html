<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yield — System Status</title>
  <meta name="description" content="Live health of Yield: each AI, the platform services, and build availability." />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    :root {
      --bg: #0a0c11; --bg-2: #0f131b; --panel: #141823; --panel-2: #1a1f2b; --line: #222836;
      --text: #eef0f8; --muted: #98a2b3; --brand: #7c5cff; --brand-2: #00d4b4;
      --ok: #3ecf8e; --warn: #e8c24a; --err: #f0566d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg);
      color: var(--text); font-family: var(--font-body, "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif); font-size: 15px; line-height: 1.55;
      min-height: 100vh;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 2.2rem 1.1rem 3rem; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.4rem; }
    .brand { font-family: var(--font-display, "Space Grotesk", inherit); font-weight: 700; font-size: 1.15rem; letter-spacing: -.01em; }
    .brand .grad { color: var(--brand); }
    .brand .dia { color: var(--brand); margin-right: .3rem; }
    a { color: var(--brand-2); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .banner {
      display: flex; align-items: center; gap: .75rem; padding: 1rem 1.15rem; border-radius: 14px;
      border: 1px solid var(--line); background: var(--panel); margin-bottom: 1.4rem; font-weight: 600;
    }
    .banner .big-dot { width: 13px; height: 13px; border-radius: 50%; flex: 0 0 auto; box-shadow: 0 0 0 4px rgba(255,255,255,.04); }
    .banner.ok { border-color: rgba(34,197,94,.4); }
    .banner.bad { border-color: rgba(239,68,68,.4); }
    .banner small { display: block; color: var(--muted); font-weight: 400; font-size: .82rem; }
    section { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; margin-bottom: 1.1rem; overflow: hidden; }
    .sec-head { padding: .8rem 1.15rem; font-weight: 700; font-size: .8rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; }
    .sec-head .count { color: var(--muted); letter-spacing: 0; text-transform: none; font-weight: 600; }
    .sub-head { padding: .7rem 1.15rem .5rem; font-weight: 700; font-size: .68rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); border-top: 1px solid var(--line); background: var(--panel-2); }
    .row { display: flex; align-items: center; gap: .8rem; padding: .8rem 1.15rem; border-bottom: 1px solid var(--line); }
    .row:last-child { border-bottom: 0; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
    .name { font-weight: 600; }
    .row .meta { margin-left: auto; color: var(--muted); font-size: .82rem; text-align: right; white-space: nowrap; }
    .sub { color: var(--muted); font-size: .8rem; margin-top: .15rem; }
    footer { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-top: 1.4rem; color: var(--muted); font-size: .82rem; flex-wrap: wrap; }
    button.refresh { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: .42rem .8rem; font: inherit; font-size: .82rem; font-weight: 600; cursor: pointer; }
    button.refresh:hover { border-color: var(--brand); }
    .c-ok { background: var(--ok); } .c-warn { background: var(--warn); } .c-err { background: var(--err); } .c-mut { background: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand"><span class="dia">◆</span>Yield <span style="color:var(--muted);font-weight:400">· System Status</span></div>
      <a href="/app">Open the builder →</a>
    </header>

    <div id="banner" class="banner"><span class="big-dot c-mut"></span><div>Checking status…</div></div>

    <section id="ai"><div class="sec-head">AIs</div><div class="row"><span class="name">Loading…</span></div></section>
    <section id="platform"><div class="sec-head">Platform</div><div class="row"><span class="name">Loading…</span></div></section>
    <section id="builds"><div class="sec-head">Builds</div><div class="row"><span class="name">Loading…</span></div></section>

    <footer>
      <span id="updated">—</span>
      <button class="refresh" id="refreshBtn">↻ Refresh</button>
    </footer>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    // status -> [dot class, label]
    const MAP = {
      operational: ['c-ok', 'Operational'],
      ok:          ['c-ok', 'Operational'],
      degraded:    ['c-warn', 'Degraded'],
      slow:        ['c-warn', 'Slow'],
      rate_limited:['c-warn', 'Rate-limited'],
      auth:        ['c-err', 'Key not set'],
      unavailable: ['c-err', 'Unavailable'],
      down:        ['c-err', 'Down'],
      error:       ['c-err', 'Error'],
      unconfigured:['c-mut', 'Not configured'],
      unknown:     ['c-mut', 'Unknown'],
    };
    const look = (s) => MAP[s] || (String(s || '').startsWith('error') ? MAP.error : MAP.unknown);
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

    function row(name, status, meta, sub) {
      const [dot, label] = look(status);
      return `<div class="row">
        <span class="dot ${dot}"></span>
        <div><div class="name">${esc(name)}</div>${sub ? `<div class="sub">${esc(sub)}</div>` : ''}</div>
        <span class="meta">${esc(meta != null ? meta : label)}</span>
      </div>`;
    }

    async function load() {
      try {
        const d = await (await fetch('/api/health', { cache: 'no-store' })).json();
        render(d);
      } catch (e) {
        $('#banner').className = 'banner bad';
        $('#banner').innerHTML = `<span class="big-dot c-err"></span><div>Couldn't reach the status service<small>${esc(e)}</small></div>`;
      }
    }

    function render(d) {
      const ais = d.ais || { up: 0, total: 0, models: [] };
      const healthy = !!d.ok;
      $('#banner').className = 'banner ' + (healthy ? 'ok' : 'bad');
      $('#banner').innerHTML = `<span class="big-dot ${healthy ? 'c-ok' : 'c-err'}"></span>
        <div>${healthy ? 'All systems operational' : 'Some systems are degraded'}
          <small>${ais.up}/${ais.total} AIs operational · ${d.authEnabled ? 'Accounts required' : 'Open testing mode'}</small></div>`;

      // Each AI on its own line, split into coder models and utility AIs (router / vision / guard).
      const line = (m) => row(m.label, m.status, m.status === 'operational' ? `${m.latencyMs} ms` : look(m.status)[1]);
      const coders = (ais.models || []).filter((m) => m.group !== 'utility');
      const utils = (ais.models || []).filter((m) => m.group === 'utility');
      const coderRows = coders.map(line).join('') || row('No AIs configured', 'unknown', 'n/a');
      const utilRows = utils.length ? `<div class="sub-head">Utility AIs</div>${utils.map(line).join('')}` : '';
      $('#ai').innerHTML = `<div class="sec-head"><span>Coder models</span><span class="count">${ais.up}/${ais.total} up</span></div>${coderRows}${utilRows}`;

      // Platform services (named by function, no vendor names)
      const pf = d.platform || {};
      const platRows = [
        ['API', pf.api],
        ['Database', pf.database],
        ['Storage', pf.storage],
        ['Build engine', pf.buildEngine],
      ].map(([n, s]) => {
        const status = String(s || '').startsWith('error') ? 'error' : (s || 'unknown');
        const meta = String(s || '').startsWith('error') ? String(s).slice(7, 70) : look(status)[1];
        return row(n, status, meta);
      }).join('');
      $('#platform').innerHTML = `<div class="sec-head">Platform</div>${platRows}`;

      // Builds — unlimited until High Usage Time, when only Priority members build
      const u = d.usage;
      let buildsHtml;
      if (u) {
        const hu = u.highUsage;
        buildsHtml =
          row('Builds', hu ? 'rate_limited' : 'operational',
            hu ? 'High Usage Time' : 'Unlimited',
            hu ? 'Free & anonymous builds are paused — Priority members keep building.'
               : 'No per-user or daily limits. Priority members keep building during High Usage Time.') +
          row('Free hosting budget', u.monthlyUsedPct >= 90 ? 'degraded' : 'operational', u.monthlyUsedPct + '% used',
            u.monthlyUsedPct >= 90 ? 'Near the free ceiling — High Usage Time may begin soon.' : '');
      } else {
        buildsHtml = row('Builds', 'unknown', 'unavailable');
      }
      $('#builds').innerHTML = `<div class="sec-head">Builds</div>${buildsHtml}`;

      $('#updated').textContent = 'Last checked ' + new Date(d.time || Date.now()).toLocaleString();
    }

    $('#refreshBtn').addEventListener('click', load);
    load();
    setInterval(load, 60000); // refresh every 60s (AI probes are cached ~5 min server-side)
  </script>
</body>
</html>
